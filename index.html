            <h4>Hade du med detta?</h4>
            ${u.bedömning.map((b, i) => `
              <label>
                <input type="checkbox" />
                <span>${b}</span>
              </label>
            `).join('')}
          </div>
          <p class="muted" style="font-size:14px; margin-top:14px;">Det är okej att missa något. Försök igen vid nästa uppgift.</p>
        ` : `
          <p>Du har svarat på alla delfrågor. Innan du tittar på exempellösningen — har du själv skrivit en sammanhängande lösning i rutan ovan?</p>
          <button id="showSol" style="margin-top:10px;">Visa exempellösning</button>
        `}
      </div>
    ` : ''}

    <div class="linkrow">
      <button class="ghost" id="backMenu">Tillbaka</button>
      <div class="spacer"></div>
      ${idx > 0 ? `<button class="ghost" id="prevU">Förra</button>` : ''}
      ${idx < UTRAKNING_NIVA2.length - 1 ? `<button id="nextU">Nästa uppgift</button>` : `<button id="nextU">Tillbaka till menyn</button>`}
    </div>
  `;

  // Koppla input-fält
  document.querySelectorAll('.question-row input[type="text"]').forEach(input => {
    if (input.disabled) return;
    const qIdx = parseInt(input.dataset.q);
    const checkInput = () => {
      const v = parseAnswer(input.value);
      if (isNaN(v)) return;
      const expected = u.frågor[qIdx].svar;
      const correct = Math.abs(v - expected) < 0.01;
      if (correct) {
        us.questionStatus[qIdx] = 'done';
        render();
      } else {
        input.style.borderColor = 'var(--bad)';
        input.style.background = 'var(--bad-soft)';
        input.style.color = 'var(--bad)';
        setTimeout(() => {
          input.style.borderColor = '';
          input.style.background = '';
          input.style.color = '';
        }, 1500);
      }
    };
    input.addEventListener('blur', checkInput);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkInput();
      }
    });
  });

  // Tips-knappar
  document.querySelectorAll('button[data-hint]').forEach(btn => {
    const i = btn.dataset.hint;
    btn.onclick = () => {
      const tip = document.getElementById('qtip-' + i);
      if (tip) tip.style.display = tip.style.display === 'none' ? 'block' : 'none';
    };
  });

  // Skrivruta — autosave
  const writing = document.getElementById('writingArea');
  if (writing) {
    let timer;
    writing.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        us.writingText = writing.value;
        state.utrakningTexts[u.id] = writing.value;
        saveState();
      }, 400);
    });
  }

  const showBtn = document.getElementById('showSol');
  if (showBtn) showBtn.onclick = () => {
    us.showSolution = true;
    render();
  };

  document.getElementById('backMenu').onclick = () => {
    state.utrakningState = null;
    state.screen = 'utrakningMenu';
    render();
  };
  const prevBtn = document.getElementById('prevU');
  if (prevBtn) prevBtn.onclick = () => {
    state.utrakningIdx = idx - 1;
    state.utrakningState = null;
    render();
  };
  const nextBtn = document.getElementById('nextU');
  if (nextBtn) nextBtn.onclick = () => {
    if (idx < UTRAKNING_NIVA2.length - 1) {
      state.utrakningIdx = idx + 1;
      state.utrakningState = null;
      render();
    } else {
      state.utrakningState = null;
      state.screen = 'utrakningMenu';
      render();
    }
  };

  // Fokusera första olåsta
  setTimeout(() => {
    const firstOpen = document.querySelector('.question-row:not(.locked):not(.done) input[type="text"]:not([disabled])');
    if (firstOpen) firstOpen.focus();
  }, 100);
}

/* ============================================================
   VERIFIERINGSVERKTYG - dolt lärarverktyg
   Nås via lärarläge -> "Kontrollera uppgifter"-knapp
============================================================ */

function renderVerify() {
  progLabel().textContent = 'Verifieringsverktyg';
  const count = state.verifyCount || 20;

  // Generera uppgifter
  const samples = [];
  for (const [topic, gens] of Object.entries(GENS)) {
    for (let g = 0; g < gens.length; g++) {
      for (let i = 0; i < count; i++) {
        try {
          const q = gens[g]();
          // Flagga misstänkta saker
          const flags = analyzeQuestion(q, topic, g);
          samples.push({
            topic,
            generator: g,
            iteration: i,
            prompt: q.prompt,
            type: q.type,
            answer: q.type === 'input' ? q.answer : q.choices[q.correctIndex],
            steps: q.steps || [],
            choices: q.choices || null,
            flags,
          });
        } catch (e) {
          samples.push({
            topic, generator: g, iteration: i,
            prompt: '(KRASCH)',
            error: e.message,
            flags: ['KRASCH: ' + e.message],
          });
        }
      }
    }
  }

  // Räkna varningar
  const flagged = samples.filter(s => s.flags.length > 0);

  app().innerHTML = `
    <div class="card fade">
      <h2>Verifieringsverktyg</h2>
      <p class="lead">Detta är ett dolt lärarverktyg. Här genereras ${count} variationer av varje uppgift så du kan ögna igenom och hitta fel.</p>
      <div class="stat-row">
        <div class="stat-box">
          <div class="num">${samples.length}</div>
          <div class="lbl">Genererade</div>
        </div>
        <div class="stat-box">
          <div class="num" style="color:${flagged.length > 0 ? 'var(--bad)' : 'var(--good)'}">${flagged.length}</div>
          <div class="lbl">Flaggade</div>
        </div>
        <div class="stat-box">
          <div class="num">${Object.keys(GENS).length}</div>
          <div class="lbl">Områden</div>
        </div>
      </div>
      <div class="row" style="margin-top:14px;">
        <button class="ghost small" id="verify10">Visa 10 / typ</button>
        <button class="ghost small" id="verify20">Visa 20 / typ</button>
        <button class="ghost small" id="verify50">Visa 50 / typ</button>
        <div class="spacer"></div>
        <button class="ghost small" id="exportAll">Exportera till txt</button>
        <button class="ghost small" id="toggleFlaggedOnly">${state.verifyFlaggedOnly ? 'Visa alla' : 'Visa endast flaggade'}</button>
      </div>
    </div>

    ${flagged.length > 0 ? `
      <div class="card" style="border-left:3px solid var(--bad);">
        <h3 style="margin-top:0; color:var(--bad);">Flaggade uppgifter (${flagged.length})</h3>
        <p class="muted" style="font-size:14px;">Dessa har potentiella problem och bör granskas.</p>
      </div>
    ` : `
      <div class="card" style="border-left:3px solid var(--good);">
        <h3 style="margin-top:0; color:var(--good);">Inga automatiskt flaggade fel</h3>
        <p class="muted" style="font-size:14px;">Men ögat ser saker som algoritmen missar — bläddra igenom uppgifterna nedan.</p>
      </div>
    `}

    <div class="card">
      ${(() => {
        const groupedByTopic = {};
        const toShow = state.verifyFlaggedOnly ? flagged : samples;
        toShow.forEach(s => {
          const key = `${s.topic}[${s.generator}]`;
          if (!groupedByTopic[key]) groupedByTopic[key] = [];
          groupedByTopic[key].push(s);
        });
        return Object.entries(groupedByTopic).map(([key, items]) => `
          <details style="margin-bottom:12px;">
            <summary style="cursor:pointer; padding:8px 0; font-weight:600; border-bottom:1px solid var(--line);">
              ${key} <span class="muted" style="font-weight:400; font-size:14px;">(${items.length} st${items.some(i => i.flags.length > 0) ? ', ' + items.filter(i => i.flags.length > 0).length + ' flaggade' : ''})</span>
            </summary>
            <div style="padding:10px 0;">
              ${items.map((s, i) => `
                <div style="padding:10px 12px; margin:6px 0; background:${s.flags.length > 0 ? 'var(--bad-soft)' : 'var(--paper)'}; border:1px solid ${s.flags.length > 0 ? 'var(--bad)' : 'var(--line)'}; border-radius:4px; font-size:14px;">
                  <div>${s.prompt}</div>
                  <div style="margin-top:6px; font-family:var(--font-math); font-weight:600;">Svar: ${s.answer}${s.choices ? ' &nbsp;<span class="muted">(av: ' + s.choices.join(', ') + ')</span>' : ''}</div>
                  ${s.flags.length > 0 ? `
                    <div style="margin-top:6px; color:var(--bad); font-size:13px;">
                      <strong>⚠ Flaggat:</strong> ${s.flags.join('; ')}
                    </div>
                  ` : ''}
                  ${s.steps.length > 0 ? `
                    <details style="margin-top:6px;">
                      <summary class="muted" style="cursor:pointer; font-size:13px;">Lösningsgång</summary>
                      <div style="font-size:13px; padding:6px 0 0 12px; color:var(--muted);">
                        ${s.steps.map(step => `<div style="margin:2px 0;">${step}</div>`).join('')}
                      </div>
                    </details>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          </details>
        `).join('');
      })()}
    </div>

    <div class="linkrow">
      <button class="ghost" id="backMenu">Tillbaka till huvudmeny</button>
    </div>
  `;

  document.getElementById('verify10').onclick = () => { state.verifyCount = 10; render(); };
  document.getElementById('verify20').onclick = () => { state.verifyCount = 20; render(); };
  document.getElementById('verify50').onclick = () => { state.verifyCount = 50; render(); };
  document.getElementById('toggleFlaggedOnly').onclick = () => {
    state.verifyFlaggedOnly = !state.verifyFlaggedOnly;
    render();
  };
  document.getElementById('exportAll').onclick = () => exportVerification(samples);
  document.getElementById('backMenu').onclick = () => { state.screen = 'topicMenu'; render(); };
}

// Analysera en uppgift för misstänkta saker
function analyzeQuestion(q, topic, gIdx) {
  const flags = [];
  const promptText = q.prompt.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');

  if (q.type === 'input') {
    if (q.answer == null || isNaN(q.answer)) flags.push('Svar är NaN/null');
    if (typeof q.answer === 'number' && Math.abs(q.answer) > 100000) flags.push('Svar mycket stort: ' + q.answer);
    if (q.answer === 0 && !promptText.match(/0\s*(kr|m|cm|°)/)) flags.push('Svar är 0');

    // Kolla enhetskonsistens i lösningssteg
    if (q.steps) {
      const stepsText = q.steps.join(' ');
      // Om uppgiften har "cm" men svaret antyder "m"
      const promptHasCm = /\bcm\b/.test(promptText);
      const promptHasM = /\bm\b/.test(promptText) && !/cm\b/.test(promptText);
      const promptHasKr = /\bkr\b/.test(promptText);

      // Kolla att stegen matchar svaret
      const lastStep = q.steps[q.steps.length - 1] || '';
      const lastStepNumMatch = lastStep.match(/-?\d+(?:[,.]\d+)?/g);
      if (lastStepNumMatch && lastStepNumMatch.length > 0) {
        const lastNumInStep = parseFloat(lastStepNumMatch[lastStepNumMatch.length - 1].replace(',', '.'));
        if (!isNaN(lastNumInStep) && Math.abs(lastNumInStep - q.answer) > Math.max(0.01, Math.abs(q.answer) * 0.01)) {
          // Sista talet i sista steget matchar inte svaret — kan vara ok om svaret står tidigare
          const allNumsInLast = lastStepNumMatch.map(s => parseFloat(s.replace(',', '.')));
          if (!allNumsInLast.some(n => Math.abs(n - q.answer) < Math.max(0.01, Math.abs(q.answer) * 0.01))) {
            flags.push('Sista steg matchar inte svar (' + q.answer + ' vs ' + lastNumInStep + ')');
          }
        }
      }
    }
  } else if (q.type === 'mc') {
    if (q.correctIndex < 0 || q.correctIndex >= q.choices.length) flags.push('correctIndex utanför choices');
    if (q.choices.length < 2) flags.push('För få alternativ');
    // Dubletter
    if (new Set(q.choices).size !== q.choices.length) flags.push('Dubletter i alternativ');
  }

  // Mycket långa prompter
  if (promptText.length > 300) flags.push('Mycket lång prompt');

  return flags;
}

function exportVerification(samples) {
  const lines = [
    'VERIFIERINGSEXPORT – ' + new Date().toLocaleString('sv-SE'),
    `Version: ${VERSION}`,
    `Totalt: ${samples.length} uppgifter`,
    `Flaggade: ${samples.filter(s => s.flags.length > 0).length}`,
    '',
    '=== FLAGGADE ===',
    ''
  ];
  samples.filter(s => s.flags.length > 0).forEach(s => {
    lines.push(`[${s.topic}/${s.generator}] ${s.prompt.replace(/<[^>]+>/g, '')}`);
    lines.push(`  Svar: ${s.answer}`);
    lines.push(`  Flaggor: ${s.flags.join('; ')}`);
    lines.push('');
  });
  lines.push('');
  lines.push('=== ALLA ===');
  lines.push('');
  samples.forEach(s => {
    lines.push(`[${s.topic}/${s.generator}] ${s.prompt.replace(/<[^>]+>/g, '')}`);
    lines.push(`  Svar: ${s.answer}`);
    if (s.flags.length > 0) lines.push(`  ⚠ ${s.flags.join('; ')}`);
    lines.push('');
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `verifiering-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function renderQuestionInput(q) {
  if (q.type === 'mc') {
    return `
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice" data-idx="${i}">${c}</button>
        `).join('')}
      </div>
      <input type="hidden" id="mcPicked" value="-1">
    `;
  } else {
    return `
      <div class="row">
        <input class="answer" id="ansInput" type="text" inputmode="text" placeholder="Ditt svar" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div class="muted" style="margin-top:8px; font-size:13px;">Tips: skriv decimaltal med komma (3,5) eller punkt (3.5). Båda funkar.</div>
    `;
  }
}

function wireQuestion(q, onAnswered) {
  const submitBtn = document.getElementById('submitBtn');
  let answered = false;

  if (q.type === 'mc') {
    const btns = document.querySelectorAll('.choice');
    let picked = -1;
    btns.forEach(btn => {
      btn.onclick = () => {
        if (answered) return;
        btns.forEach(b => b.style.borderColor = '');
        btn.style.borderColor = 'var(--ink)';
        btn.style.background = 'var(--accent-soft)';
        picked = parseInt(btn.dataset.idx);
        document.getElementById('mcPicked').value = picked;
      };
    });
    submitBtn.onclick = () => {
      if (answered) return;
      if (picked === -1) {
        submitBtn.textContent = 'Välj ett svar först';
        setTimeout(() => { if (!answered) submitBtn.textContent = 'Svara'; }, 1200);
        return;
      }
      answered = true;
      const correct = picked === q.correctIndex;
      btns.forEach((b, i) => {
        b.disabled = true;
        b.style.background = '';
        b.style.borderColor = '';
        if (i === picked && correct) b.classList.add('picked-correct');
        else if (i === picked && !correct) b.classList.add('picked-wrong');
        else if (i === q.correctIndex) b.classList.add('reveal-correct');
      });
      showFeedback(q, correct);
      onAnswered(correct);
    };
  } else {
    const input = document.getElementById('ansInput');
    input.focus();
    input.onkeydown = e => {
      if (e.key === 'Enter' && !answered) submitBtn.click();
    };
    submitBtn.onclick = () => {
      if (answered) return;
      const v = parseAnswer(input.value);
      if (isNaN(v)) {
        submitBtn.textContent = 'Skriv ett svar';
        setTimeout(() => { if (!answered) submitBtn.textContent = 'Svara'; }, 1200);
        return;
      }
      answered = true;
      const tol = q.tolerance || 0.01;
      const correct = Math.abs(v - q.answer) <= tol;
      input.disabled = true;
      if (correct) {
        input.style.borderColor = 'var(--good)';
        input.style.background = 'var(--good-soft)';
      } else {
        input.style.borderColor = 'var(--bad)';
        input.style.background = 'var(--bad-soft)';
      }
      showFeedback(q, correct);
      onAnswered(correct);
    };
  }
}

function showFeedback(q, correct) {
  const fb = document.getElementById('fb');
  const correctText = q.type === 'mc' ? q.choices[q.correctIndex] : fmtNum(q.answer);
  if (correct) {
    fb.innerHTML = `
      <div class="feedback good">
        <span class="tag">Rätt svar</span>
        Bra jobbat. Så här kan man tänka:
        <div class="steps">
          ${q.steps.map(s => `<div>${s}</div>`).join('')}
        </div>
      </div>
    `;
  } else {
    fb.innerHTML = `
      <div class="feedback bad">
        <span class="tag">Inte riktigt</span>
        Rätt svar är <strong>${correctText}</strong>. Så här kan man tänka steg för steg:
        <div class="steps">
          ${q.steps.map(s => `<div>${s}</div>`).join('')}
        </div>
        Ta det lugnt, du får nästa fråga strax och får öva mer.
      </div>
    `;
  }
}

/* ============================================================
   LÄRARLOGGBOK
   Aktiveras via URL (?larare=1) eller tangenter (Shift+L tre gånger)
============================================================ */
function isTeacherMode() {
  const params = new URLSearchParams(window.location.search);
  return params.get('larare') === '1' || localStorage.getItem('np_teacher_mode') === '1';
}

function getCurrentContext() {
  const screen = state.screen;
  if (screen === 'practice' && state.currentTopic) {
    const topic = TOPICS.find(t => t.id === state.currentTopic);
    return `Tränar: ${topic ? topic.name : state.currentTopic}`;
  }
  if (screen === 'resonemang' && state.currentResonemang != null) {
    const r = RESONEMANG[state.currentResonemang];
    return `Resonemangsuppgift: ${r ? r.område : ''}`;
  }
  if (screen === 'diagnosis') return 'Start-kollen';
  if (screen === 'finalTest') return 'Slutprovet';
  if (screen === 'strategier') return 'Strategier';
  if (screen === 'npProv') return 'NP-prov (länkar)';
  if (screen === 'topicMenu') return 'Huvudmeny';
  if (screen === 'start') return 'Startsidan';
  return screen;
}

function renderLogEntries() {
  const entries = document.getElementById('logEntries');
  if (!entries) return;
  if (state.teacherLog.length === 0) {
    entries.innerHTML = '<div style="color:#a39482; font-style:italic; padding:8px 0;">Inga anteckningar än.</div>';
    return;
  }
  entries.innerHTML = [...state.teacherLog].reverse().map(e => `
    <div class="entry">
      <div class="when">${e.when}</div>
      <div class="ctx">${e.context}</div>
      <div>${escapeHtml(e.text)}</div>
    </div>
  `).join('');
}

function saveLogEntry() {
  const input = document.getElementById('logInput');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const when = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  state.teacherLog.push({
    when,
    context: getCurrentContext(),
    text,
  });
  saveState();
  input.value = '';
  renderLogEntries();
}

function exportLog() {
  if (state.teacherLog.length === 0) {
    alert('Inga anteckningar att exportera än.');
    return;
  }
  const text = [
    `LÄRARLOGGBOK – NP-matteverktyget`,
    `Exporterad: ${new Date().toLocaleString('sv-SE')}`,
    `Version: ${VERSION}`,
    `Antal anteckningar: ${state.teacherLog.length}`,
    ``,
    `====================`,
    ``,
    ...state.teacherLog.map(e => `[${e.when}] ${e.context}\n${e.text}\n`),
  ].join('\n');
  // Skapa en nedladdningslänk
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lararlogg-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function initTeacherMode() {
  if (!isTeacherMode()) return;
  // Spara flaggan så den överlever omladdningar
  localStorage.setItem('np_teacher_mode', '1');
  const toggle = document.getElementById('logToggle');
  const log = document.getElementById('teacherLog');
  toggle.style.display = 'block';
  toggle.onclick = () => {
    const visible = log.style.display !== 'none';
    log.style.display = visible ? 'none' : 'block';
    if (!visible) {
      renderLogEntries();
      document.getElementById('logInput').focus();
    }
  };
  document.getElementById('logSave').onclick = saveLogEntry;
  document.getElementById('logExport').onclick = exportLog;
  document.getElementById('logVerify').onclick = () => {
    log.style.display = 'none';
    state.screen = 'verify';
    state.verifyCount = 20;
    state.verifyFlaggedOnly = false;
    render();
  };
  document.getElementById('logClose').onclick = () => { log.style.display = 'none'; };
  // Ctrl+Enter i textarean sparar direkt
  document.getElementById('logInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      saveLogEntry();
    }
  });
}

document.getElementById('resetBtn').onclick = () => {
  if (confirm('Vill du verkligen börja om från början? Då nollställs din träning (men inte eventuella loggboksanteckningar).')) {
    // Bevara loggbok
    const savedLog = state.teacherLog;
    state = defaultState();
    state.teacherLog = savedLog;
    saveState();
    render();
  }
};

// Visa versionsnummer i foten
document.querySelector('footer.site span').textContent = `Ett träningsverktyg byggt för dig som vill bli godkänd. · ${VERSION}`;

initThemePicker();
updateStreakDisplay(false);
initTeacherMode();
