<!DOCTYPE html>
<html lang="sv" data-theme="papper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara NP i matte – åk 9</title>
<style>
  /* PAPPER (default) - lugn serif-känsla */
  :root, [data-theme="papper"] {
    --bg: #f5f1ea;
    --paper: #fbf8f2;
    --ink: #1f1b16;
    --muted: #6b6359;
    --line: #d9d0c1;
    --accent: #8a3a1f;
    --accent-soft: #e8dccf;
    --good: #3a6b4a;
    --good-soft: #dce8dd;
    --bad: #8a3a1f;
    --bad-soft: #f0dcd3;
    --shadow: 0 1px 0 rgba(31,27,22,0.04), 0 6px 24px rgba(31,27,22,0.06);
    --font-body: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --font-math: 'Cambria Math', Cambria, 'Times New Roman', serif;
  }

  /* MÖRK - kvällsträning, djupa toner */
  [data-theme="mork"] {
    --bg: #141218;
    --paper: #1e1b22;
    --ink: #ebe5d9;
    --muted: #8a8276;
    --line: #2e2a32;
    --accent: #e8a87c;
    --accent-soft: #2e2521;
    --good: #7fc89a;
    --good-soft: #1f2e25;
    --bad: #e67e6c;
    --bad-soft: #2e1f1c;
    --shadow: 0 1px 0 rgba(0,0,0,0.2), 0 8px 32px rgba(0,0,0,0.4);
    --font-body: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --font-math: 'Cambria Math', Cambria, 'Times New Roman', serif;
  }

  /* FÄRGGLAD - mer "app"-känsla, energi, men fortfarande lugn nog att plugga i */
  [data-theme="farg"] {
    --bg: #f0f4f8;
    --paper: #ffffff;
    --ink: #1a2332;
    --muted: #5a6b7e;
    --line: #d6dde5;
    --accent: #2e7dd7;
    --accent-soft: #dbe8f7;
    --good: #22a06b;
    --good-soft: #d4f0e0;
    --bad: #e54b4b;
    --bad-soft: #fadedd;
    --shadow: 0 2px 4px rgba(46, 125, 215, 0.05), 0 8px 24px rgba(46, 125, 215, 0.08);
    --font-body: 'Avenir Next', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-math: 'SF Mono', 'Menlo', 'Consolas', monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); transition: background 0.3s ease, color 0.3s ease; }
  body {
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 120px;
  }
  header.site {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 28px;
    gap: 12px;
  }
  header.site h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0;
  }
  header.site .head-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header.site .streak {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    transition: transform 0.2s ease;
  }
  header.site .streak.pulse { animation: streakpulse 0.6s ease; }
  @keyframes streakpulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  header.site .streak svg { width: 14px; height: 14px; }
  header.site .prog {
    font-size: 14px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .theme-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .theme-btn svg { width: 16px; height: 16px; }

  .theme-menu {
    position: absolute;
    top: 48px;
    right: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
    box-shadow: var(--shadow);
    z-index: 100;
    min-width: 140px;
    display: none;
  }
  .theme-menu.open { display: block; }
  .theme-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--ink);
    font-size: 14px;
  }
  .theme-menu button:hover { background: var(--accent-soft); }
  .theme-menu button.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }
  .theme-picker-wrap { position: relative; }
  h2 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  h3 {
    font-size: 20px;
    font-weight: 600;
    margin: 28px 0 10px;
  }
  p { margin: 0 0 14px; }
  .lead { color: var(--muted); font-size: 17px; margin-bottom: 24px; }
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 26px 26px 22px;
    box-shadow: var(--shadow);
  }
  .card + .card { margin-top: 16px; }

  button, .btn {
    font-family: inherit;
    font-size: 16px;
    padding: 11px 20px;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
    letter-spacing: 0.01em;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: translateY(1px); }
  button.ghost {
    background: transparent;
    color: var(--ink);
    border-color: var(--line);
  }
  button.ghost:hover { background: var(--accent-soft); }
  button.small { font-size: 14px; padding: 8px 14px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .q-prompt {
    font-size: 22px;
    line-height: 1.4;
    margin: 6px 0 18px;
    font-weight: 500;
  }
  .q-prompt .math {
    font-family: 'Cambria Math', Cambria, 'Times New Roman', serif;
    font-weight: 500;
  }
  .choices { display: grid; gap: 10px; }
  .choice {
    display: block;
    text-align: left;
    padding: 14px 18px;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 17px;
    cursor: pointer;
    font-family: 'Cambria Math', Cambria, 'Times New Roman', serif;
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  .choice:hover { background: var(--accent-soft); border-color: var(--accent); }
  .choice.picked-correct {
    background: var(--good-soft);
    border-color: var(--good);
    color: var(--good);
  }
  .choice.picked-wrong {
    background: var(--bad-soft);
    border-color: var(--bad);
    color: var(--bad);
  }
  .choice.reveal-correct {
    border-color: var(--good);
    color: var(--good);
  }
  .choice:disabled { cursor: default; }

  input.answer {
    font-family: 'Cambria Math', Cambria, serif;
    font-size: 20px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--paper);
    width: 200px;
    color: var(--ink);
  }
  input.answer:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .feedback {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 4px;
    border-left: 3px solid;
    font-size: 16px;
    line-height: 1.55;
  }
  .feedback.good { background: var(--good-soft); border-color: var(--good); }
  .feedback.bad { background: var(--bad-soft); border-color: var(--bad); }
  .feedback .tag {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .feedback.good .tag { color: var(--good); }
  .feedback.bad .tag { color: var(--bad); }
  .feedback .steps {
    background: rgba(255,255,255,0.55);
    border-radius: 3px;
    padding: 10px 14px;
    margin-top: 10px;
    font-family: 'Cambria Math', Cambria, serif;
  }
  .feedback .steps div { margin: 3px 0; }

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row.end { justify-content: flex-end; }
  .spacer { flex: 1; }

  .topic-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  @media (min-width: 560px) {
    .topic-grid { grid-template-columns: 1fr 1fr; }
  }
  .topic-btn {
    text-align: left;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 16px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto auto auto;
    column-gap: 14px;
    row-gap: 4px;
    align-items: start;
  }
  .topic-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .topic-btn .topic-icon {
    grid-row: 1 / span 3;
    grid-column: 1;
  }
  .topic-btn .name {
    grid-column: 2;
    font-weight: 600;
    font-size: 17px;
    align-self: center;
  }
  .topic-btn .meta {
    grid-column: 2;
    font-size: 14px;
    color: var(--muted);
  }
  .topic-btn .bar {
    grid-column: 2;
    margin-top: 6px;
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
  }
  .topic-btn .bar span {
    display: block;
    height: 100%;
    background: var(--good);
    transition: width 0.3s ease;
  }
  /* För gamla knappar utan ikon - enkel block-layout */
  .topic-btn.no-icon {
    display: block;
  }
  .topic-btn.no-icon .name { display: block; }
  .topic-btn.no-icon .meta { display: block; margin-top: 4px; }
  .topic-btn.no-icon .bar { margin-top: 10px; }

  .muted { color: var(--muted); font-size: 14px; }
  .kbd {
    font-family: 'Cambria Math', serif;
    background: var(--accent-soft);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 0.95em;
  }

  .diag-intro ol { padding-left: 22px; }
  .diag-intro li { margin: 6px 0; }

  .result-big {
    font-size: 64px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
    margin: 10px 0 4px;
    font-family: 'Iowan Old Style', Georgia, serif;
  }
  .result-label { color: var(--muted); font-size: 15px; }

  .dots {
    display: flex;
    gap: 6px;
    margin: 14px 0 0;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--line);
  }
  .dot.on { background: var(--ink); }

  .linkrow {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .hint-box {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--accent-soft);
    border-radius: 4px;
    font-size: 15px;
    color: var(--ink);
  }
  .hint-box strong { color: var(--accent); }

  svg.fig { display: block; margin: 8px 0 16px; }

  /* Staplade bråk */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: -0.45em;
    margin: 0 0.15em;
    font-size: 0.92em;
    line-height: 1;
  }
  .frac .num {
    display: block;
    padding: 0 0.25em 0.05em;
    border-bottom: 1.2px solid currentColor;
  }
  .frac .den {
    display: block;
    padding: 0.05em 0.25em 0;
  }
  /* I knappar och större sammanhang får bråken lite mer andrum */
  .choice .frac { font-size: 1em; vertical-align: -0.5em; }
  .q-prompt .frac { font-size: 0.95em; }

  /* Resonemang */
  textarea.solution {
    width: 100%;
    min-height: 180px;
    padding: 14px;
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 16px;
    line-height: 1.5;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--paper);
    color: var(--ink);
    resize: vertical;
    box-sizing: border-box;
  }
  textarea.solution:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .solution-box {
    background: #fefdf9;
    border: 1px solid var(--line);
    border-left: 3px solid var(--good);
    border-radius: 4px;
    padding: 18px 20px;
    margin-top: 12px;
    font-size: 16px;
    line-height: 1.65;
  }
  .solution-box .solution-step {
    margin-top: 12px;
    color: var(--accent);
    font-size: 14px;
    letter-spacing: 0.03em;
  }
  .solution-box .solution-step:first-child { margin-top: 0; }
  .solution-box div { margin: 2px 0; }

  .checklist {
    margin-top: 14px;
    padding: 14px 18px;
    background: var(--accent-soft);
    border-radius: 4px;
  }
  .checklist h4 {
    margin: 0 0 10px;
    font-size: 15px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .checklist label {
    display: flex;
    gap: 10px;
    padding: 6px 0;
    cursor: pointer;
    font-size: 15px;
    line-height: 1.4;
  }
  .checklist input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--good);
    cursor: pointer;
  }

  /* Strategikort */
  .strategy-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px 20px;
    margin: 12px 0;
  }
  .strategy-card h4 {
    margin: 0 0 8px;
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
  }
  .strategy-card p { margin: 6px 0; font-size: 15px; }
  .strategy-card .example {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 3px;
    font-size: 14px;
    font-style: italic;
    color: var(--muted);
  }

  /* 14-dagars-plan */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin: 16px 0;
  }
  @media (max-width: 400px) {
    .day-grid { grid-template-columns: repeat(5, 1fr); }
  }
  .day-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.15s ease;
    padding: 4px;
    min-height: 60px;
  }
  .day-cell .day-num {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }
  .day-cell .day-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .day-cell.done {
    background: var(--good-soft);
    border-color: var(--good);
    color: var(--good);
  }
  .day-cell.done .day-label { color: var(--good); }
  .day-cell.current {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .day-cell.current .day-label { color: var(--accent); font-weight: 600; }
  .day-cell.locked {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .day-cell:hover:not(.locked) {
    transform: translateY(-1px);
    border-color: var(--accent);
  }

  /* Uppställningsvisualisering */
  .uppstallning {
    font-family: var(--font-math);
    font-size: 32px;
    display: inline-block;
    padding: 24px 20px 16px;
    background: var(--bg);
    border-radius: 8px;
    margin: 16px auto;
    font-variant-numeric: tabular-nums;
    line-height: 1.3;
  }
  .uppstallning .row {
    display: block;
    text-align: right;
    white-space: pre;
  }
  .uppstallning .sign {
    display: inline-block;
    width: 1ch;
  }
  .uppstallning .line {
    border-bottom: 2px solid var(--ink);
    margin: 2px 0 4px;
    height: 0;
  }
  .uppstallning .minne {
    font-size: 16px;
    color: var(--accent);
    display: block;
    text-align: right;
    line-height: 1;
    min-height: 1em;
    margin-bottom: 2px;
  }
  .uppstallning .digit {
    display: inline-block;
    padding: 1px 2px;
    transition: background 0.3s ease;
  }
  .uppstallning .digit.highlight {
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 3px;
  }
  .uppstallning .digit.result {
    background: var(--good-soft);
    color: var(--good);
    border-radius: 3px;
  }

  /* Lektion med steg */
  .lesson-step {
    padding: 14px 16px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    margin: 10px 0;
    font-size: 16px;
    line-height: 1.5;
    animation: fadein 0.4s ease;
  }

  .paper-reminder {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    margin: 14px 0;
  }
  .paper-reminder svg { width: 18px; height: 18px; flex-shrink: 0; }

  .substep-label {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-weight: 600;
  }

  /* Visa hur du räknar */
  .step-block {
    padding: 14px 16px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    margin: 12px 0;
    font-size: 17px;
    line-height: 1.6;
  }
  .step-block.locked {
    opacity: 0.5;
    pointer-events: none;
  }
  .step-block.done {
    border-left: 3px solid var(--good);
    background: var(--good-soft);
  }
  .step-input {
    font-family: var(--font-math);
    font-size: 18px;
    padding: 6px 10px;
    border: 2px solid var(--accent);
    border-radius: 4px;
    background: var(--paper);
    width: 90px;
    text-align: center;
    color: var(--ink);
    margin: 0 4px;
    vertical-align: baseline;
  }
  .step-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .step-input.correct {
    border-color: var(--good);
    background: var(--good-soft);
    color: var(--good);
  }
  .step-input.wrong {
    border-color: var(--bad);
    background: var(--bad-soft);
    color: var(--bad);
  }
  .step-result {
    font-family: var(--font-math);
    font-weight: 600;
    color: var(--good);
    padding: 0 4px;
  }
  .question-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .question-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .question-row.locked { opacity: 0.45; pointer-events: none; }
  .question-row.done {
    border-left: 3px solid var(--good);
    background: var(--good-soft);
  }
  .question-row .q-text {
    font-size: 15px;
    font-weight: 500;
  }
  .question-row .q-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .question-row .q-input-row input {
    flex: 1;
    max-width: 140px;
    padding: 8px 12px;
    font-family: var(--font-math);
    font-size: 17px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);
    color: var(--ink);
  }
  .question-row.done input { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .question-row .q-tip {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .milestone-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--good);
    color: white;
    padding: 14px 22px;
    border-radius: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 15px;
    font-weight: 600;
    z-index: 500;

<script>
/* ============================================================
   KLARA NP – MATTE ÅK 9
   Ett komplett träningsverktyg för E-nivå.
   Bygger på: diagnos -> riktad träning -> blandat prov.
============================================================ */

const STATE_KEY = 'np_matte_state_v1';
const VERSION = 'v1.0 – 19 apr 2026';

// Hjälpfunktioner
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = arr => arr[rand(0, arr.length - 1)];
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const gcd = (a, b) => b === 0 ? Math.abs(a) : gcd(b, a % b);
const simplifyFrac = (n, d) => {
  const g = gcd(n, d);
  return [n / g, d / g];
};
const fmtNum = n => {
  if (Number.isInteger(n)) return String(n);
  return String(Math.round(n * 1000) / 1000).replace('.', ',');
};
const parseAnswer = s => {
  if (s == null) return NaN;
  return parseFloat(String(s).trim().replace(',', '.').replace(/\s/g, ''));
};

// Matematisk formatering
const frac = (n, d) => `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`;
const sup = (base, exp) => `${base}<sup>${exp}</sup>`;
const sq = base => `${base}²`;
const cube = base => `${base}³`;

/* ============================================================
   TEMAHANTERING
============================================================ */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  state.theme = theme;
  saveState();
  // Uppdatera markering i menyn
  document.querySelectorAll('.theme-menu button').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
}

function initThemePicker() {
  const btn = document.getElementById('themeBtn');
  const menu = document.getElementById('themeMenu');
  if (!btn || !menu) return;
  btn.onclick = (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  };
  menu.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      applyTheme(b.dataset.theme);
      menu.classList.remove('open');
    };
  });
  // Stäng menyn vid klick utanför
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && e.target !== btn) {
      menu.classList.remove('open');
    }
  });
  // Initiera
  applyTheme(state.theme || 'papper');
}

/* ============================================================
   STREAK (dagar i rad)
============================================================ */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBetween(a, b) {
  const d1 = new Date(a);
  const d2 = new Date(b);
  return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}

function pingStreak() {
  const today = todayStr();
  if (state.lastActiveDate === today) return; // redan räknad idag

  const wasStreak = state.streak;
  if (!state.lastActiveDate) {
    state.streak = 1;
  } else {
    const diff = daysBetween(state.lastActiveDate, today);
    if (diff === 1) {
      state.streak++;
    } else if (diff > 1) {
      state.streak = 1; // förlorat streak
    }
  }
  state.lastActiveDate = today;
  saveState();
  updateStreakDisplay(state.streak > wasStreak);

  // Milstolpar för streak
  if (state.streak === 3 && !state.milestonesAwarded.streak3) {
    showMilestone('3 dagar i rad — bra rutin!');
    state.milestonesAwarded.streak3 = true;
    saveState();
  } else if (state.streak === 7 && !state.milestonesAwarded.streak7) {
    showMilestone('En hel vecka i rad — du är igång!');
    state.milestonesAwarded.streak7 = true;
    saveState();
  }
}

function updateStreakDisplay(pulse) {
  const badge = document.getElementById('streakBadge');
  const count = document.getElementById('streakCount');
  if (!badge || !count) return;
  if (state.streak > 0) {
    badge.style.display = 'inline-flex';
    count.textContent = state.streak;
    if (pulse) {
      badge.classList.remove('pulse');
      void badge.offsetWidth; // trigga reflow för att restarta animationen
      badge.classList.add('pulse');
    }
  } else {
    badge.style.display = 'none';
  }
}

/* ============================================================
   MILSTOLPAR (diskreta bubblor)
============================================================ */
function showMilestone(text) {
  // Ta bort befintlig om det finns en
  const existing = document.querySelector('.milestone-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'milestone-toast';
  toast.innerHTML = `
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <span>${text}</span>
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 500);
  }, 3500);
}

function checkMilestones() {
  // Kontrollera olika milstolpar
  const totalCorrect = Object.values(state.progress).reduce((s, p) => s + p.correct, 0);

  if (totalCorrect >= 10 && !state.milestonesAwarded.first10) {
    showMilestone('10 rätta svar — du är igång!');
    state.milestonesAwarded.first10 = true;
    saveState();
  } else if (totalCorrect >= 50 && !state.milestonesAwarded.first50) {
    showMilestone('50 rätta svar — imponerande!');
    state.milestonesAwarded.first50 = true;
    saveState();
  } else if (totalCorrect >= 100 && !state.milestonesAwarded.first100) {
    showMilestone('100 rätta svar — maratonlöpare!');
    state.milestonesAwarded.first100 = true;
    saveState();
  }

  // Streak av rätta svar i samma session
  if (state.currentStreak === 5 && !state.milestonesAwardedSession5) {
    showMilestone('5 rätt i rad!');
    state.milestonesAwardedSession5 = true;
  }
  if (state.currentStreak === 10 && !state.milestonesAwardedSession10) {
    showMilestone('10 rätt i rad — i flow!');
    state.milestonesAwardedSession10 = true;
  }
  // Områdes-milstolpar
  TOPICS.forEach(t => {
    const p = state.progress[t.id];
    const key = `mastered_${t.id}`;
    if (p.mastery >= 80 && !state.milestonesAwarded[key]) {
      showMilestone(`${t.name} — det här sitter!`);
      state.milestonesAwarded[key] = true;
      saveState();
    }
  });
}

/* ============================================================
   OMRÅDES-IKONER (SVG)
============================================================ */
const TOPIC_ICONS = {
  räknesätt: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h6M7 4v6"/><path d="M14 4l6 6M20 4l-6 6"/><path d="M4 17h6"/><circle cx="17" cy="16" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>`,
  tal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l-1 18"/><path d="M19 3l-1 18"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>`,
  algebra: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5l7 7-7 7"/><path d="M12 19h7"/></svg>`,
  geometri: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><polygon points="12 3 21 20 3 20"/></svg>`,
  samband: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20h18"/><path d="M3 20V4"/><path d="M7 16l4-6 4 3 5-8"/></svg>`,
  statistik: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="4" y="12" width="4" height="8"/><rect x="10" y="7" width="4" height="13"/><rect x="16" y="3" width="4" height="17"/></svg>`,
  problem: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.7.3-1 1-1 1.7"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/></svg>`,
  // Extra
  tabell: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>`,
  strategier: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`,
  resonemang: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 10h8M8 14h5"/></svg>`,
  npProv: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13l2 2 4-4"/></svg>`,
};

function iconHTML(key) {
  return `<div class="topic-icon">${TOPIC_ICONS[key] || ''}</div>`;
}

/* ============================================================
   UPPGIFTSGENERATORER
   Varje generator returnerar ett objekt:
   {
     type: 'mc' | 'input',
     prompt: string (HTML tillåtet i .math-span),
     figure: optional SVG string,
     choices: [str,...]  (om mc),
     correctIndex: int   (om mc),
     answer: number      (om input, används med tolerans),
     tolerance: number   (default 0.001),
     steps: [str,...]    (lösningsgång)
   }
============================================================ */

const GENS = {
  // 1. TALUPPFATTNING
  tal: [
    // Procent av tal
    () => {
      const p = pick([10, 15, 20, 25, 30, 40, 50, 60, 75]);
      const base = pick([40, 60, 80, 120, 160, 200, 240, 300, 400, 500]);
      const ans = base * p / 100;
      return {
        type: 'input',
        prompt: `Hur mycket är <span class="math">${p} %</span> av <span class="math">${base}</span>?`,
        answer: ans,
        steps: [
          `${p} % betyder ${p} hundradelar, alltså ${p}/100 = ${p/100}.`,

      const rättFörenklad = frac(n, d);
      const allaAlternativ = [
        frac(1, 6), frac(2, 6), frac(3, 6), frac(4, 6), frac(5, 6),
        frac(1, 2), frac(1, 3), frac(2, 3)
      ];
      const distraktorer = allaAlternativ.filter(a => a !== rätt && a !== rättFörenklad);
      const valda = [rätt];
      while (valda.length < 4) {
        const d2 = pick(distraktorer);
        if (!valda.includes(d2)) valda.push(d2);
      }
      const choices = shuffle(valda);
      return {
        type: 'mc',
        prompt: `Du slår en tärning (sex sidor). Hur stor är sannolikheten <span class="math">${v.text}</span>?`,
        choices,
        correctIndex: choices.indexOf(rätt),
        steps: [
          `Gynnsamma utfall: ${v.gynnsamma}.`,
          `Antal gynnsamma: ${v.g}. Totalt antal utfall: 6.`,
          `Sannolikhet = ${frac(v.g, 6)}${n !== v.g ? ` (kan också skrivas ${frac(n, d)})` : ''}.`
        ]
      };
    },
    // Sannolikhet - påse
    () => {
      const röda = rand(2, 6);
      const blå = rand(3, 8);
      const totalt = röda + blå;
      const [n, d] = simplifyFrac(röda, totalt);
      const rätt = frac(röda, totalt);
      const kandidater = [
        frac(röda, blå),
        frac(blå, totalt),
        frac(blå, röda),
        frac(1, totalt),
        frac(totalt, röda),
      ];
      const unika = [...new Set(kandidater)].filter(x => x !== rätt);
      const choices = shuffle([rätt, ...unika.slice(0, 3)]);
      return {
        type: 'mc',
        prompt: `I en påse finns <span class="math">${röda}</span> röda kulor och <span class="math">${blå}</span> blå kulor. Du drar en kula utan att titta. Vad är sannolikheten att få en röd kula?`,

/* ============================================================
   MULTIPLIKATIONSTABELL - SPACED REPETITION
   
   Alla unika kombinationer från 2·2 till 9·9 = 36 st (tack vare kommutativitet).
   Varje kombination har en "box" 1-5 (Leitner-liknande):
     Box 1: Ny/svår - visas ofta
     Box 2-4: Håller på att läras - ökande intervall
     Box 5: Behärskad - visas sällan för underhåll
   
   "Svåra sjuorna" (6·7, 6·8, 7·8, 8·9) startar med lägre status.
============================================================ */

const HARD_PAIRS = new Set(['6·7', '6·8', '7·8', '8·9', '6·9', '7·9']);

function tableKey(a, b) {
  const [lo, hi] = a <= b ? [a, b] : [b, a];
  return `${lo}·${hi}`;
}

function allTablePairs() {
  const pairs = [];
  for (let a = 2; a <= 9; a++) {
    for (let b = a; b <= 9; b++) {
      pairs.push([a, b]);
    }
  }
  return pairs; // 36 unika
}

function getPairStatus(a, b) {
  const key = tableKey(a, b);
  return state.tableStatus[key] || {
    box: HARD_PAIRS.has(key) ? 0 : 1,  // svåra börjar på 0
    lastSeen: 0,
    correctInRow: 0,
    totalAttempts: 0,
    totalCorrect: 0,
    avgTime: null,
  };
}

function updatePairStatus(a, b, correct, timeMs) {
  const key = tableKey(a, b);
  const s = getPairStatus(a, b);
  s.lastSeen = Date.now();
  s.totalAttempts++;
  if (correct) {
    s.totalCorrect++;
    s.correctInRow++;
    // Avancera box om snabbt OCH rätt (mer generöst om avgTime inte finns än)
    if (timeMs < 4000 || s.avgTime == null) {
      s.box = Math.min(5, s.box + 1);
    } else if (timeMs < 8000) {
      // Rätt men långsamt - håll box
    }
  } else {
    s.correctInRow = 0;
    s.box = Math.max(0, s.box - 2); // Stort straff för fel
  }
  // Uppdatera snittid (endast för rätt svar)
  if (correct) {
    if (s.avgTime == null) s.avgTime = timeMs;
    else s.avgTime = Math.round(s.avgTime * 0.7 + timeMs * 0.3);
  }
  state.tableStatus[key] = s;
}

// Välj nästa par att träna baserat på box-status
function pickNextPair() {
  const pairs = allTablePairs();
  // Vikta: lägre box = högre sannolikhet
  const weighted = [];
  pairs.forEach(([a, b]) => {
    const s = getPairStatus(a, b);
    // Box 0: vikt 10, Box 1: vikt 6, Box 2: 4, Box 3: 2, Box 4: 1, Box 5: 0.3
    const weights = [10, 6, 4, 2, 1, 0.3];
    const w = weights[s.box] || 1;
    // Extra vikt om nyligen fel
    const extra = s.correctInRow === 0 && s.totalAttempts > 0 ? 2 : 0;
    const totalW = w + extra;
    for (let i = 0; i < Math.round(totalW * 10); i++) {
      weighted.push([a, b]);
    }
  });
  // Undvik att välja samma par två gånger i rad
  let chosen = pick(weighted);
  if (state.lastTablePair) {
    const [la, lb] = state.lastTablePair;
    if (chosen[0] === la && chosen[1] === lb) {
      chosen = pick(weighted);
    }
  }
  state.lastTablePair = chosen;
  return chosen;
}

// Statistik över tabellen
function tableStats() {
  const pairs = allTablePairs();
  let box0 = 0, box12 = 0, box34 = 0, box5 = 0, untested = 0;
  let fastCount = 0;
  pairs.forEach(([a, b]) => {
    const s = getPairStatus(a, b);
    if (s.totalAttempts === 0) untested++;
    else if (s.box === 0) box0++;
    else if (s.box <= 2) box12++;
    else if (s.box <= 4) box34++;
    else box5++;
    if (s.avgTime != null && s.avgTime < 3500 && s.box >= 3) fastCount++;
  });
  return {
    total: pairs.length,
    untested,
    box0,
    box12,
    box34,
    box5,
    fastCount,
    mastered: box5,
    learning: box12 + box34,
    weak: box0,
  };
}

/* ============================================================
   SVG-FIGURER
============================================================ */
function themeColors() {
  // Fallback om getComputedStyle inte finns (t.ex. Node-tester)
  const fallback = {
    ink: '#1f1b16',
    muted: '#6b6359',
    accentSoft: '#e8dccf',
    accent: '#8a3a1f',
  };
  if (typeof getComputedStyle === 'undefined') return fallback;
  try {
    const s = getComputedStyle(document.documentElement);
    return {
      ink: s.getPropertyValue('--ink').trim() || fallback.ink,
      muted: s.getPropertyValue('--muted').trim() || fallback.muted,
      accentSoft: s.getPropertyValue('--accent-soft').trim() || fallback.accentSoft,
      accent: s.getPropertyValue('--accent').trim() || fallback.accent,
    };
  } catch (e) {
    return fallback;
  }
}

function svgBarChart(labels, values) {
  const c = themeColors();
  const w = 320, h = 160;
  const pad = 30;
  const max = Math.max(...values);
  const barW = (w - 2*pad) / values.length - 12;
  return `<svg class="fig" width="${w}" height="${h+30}" viewBox="0 0 ${w} ${h+30}">
    <line x1="${pad}" y1="${h-10}" x2="${w-pad}" y2="${h-10}" stroke="${c.ink}" stroke-width="1.5"/>
    <line x1="${pad}" y1="10" x2="${pad}" y2="${h-10}" stroke="${c.ink}" stroke-width="1.5"/>
    ${values.map((v, i) => {
      const barH = (v / max) * (h - 40);
      const x = pad + 10 + i * ((w - 2*pad) / values.length);
      return `
        <rect x="${x}" y="${h-10-barH}" width="${barW}" height="${barH}" fill="${c.accent}"/>
        <text x="${x+barW/2}" y="${h+5}" text-anchor="middle" font-size="12" fill="${c.ink}">${labels[i]}</text>
        <text x="${x+barW/2}" y="${h-15-barH}" text-anchor="middle" font-size="11" fill="${c.muted}">${v}</text>
      `;
    }).join('')}
  </svg>`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrera - se till att nya fält finns
      if (!parsed.resonemangTexts) parsed.resonemangTexts = {};
      if (!parsed.teacherLog) parsed.teacherLog = [];
      if (!parsed.tableStatus) parsed.tableStatus = {};
      if (!parsed.progress.räknesätt) {
        parsed.progress.räknesätt = { attempted: 0, correct: 0, mastery: 0 };
      }
      if (!parsed.theme) parsed.theme = 'papper';
      if (parsed.streak == null) parsed.streak = 0;
      if (!parsed.milestonesAwarded) parsed.milestonesAwarded = {};
      if (!parsed.plan14) parsed.plan14 = { completedDays: [], currentDay: 1, lastDayDate: null, dayStats: {} };
      return parsed;
    }
  } catch (e) {}
  return defaultState();
}
function defaultState() {
  const progress = {};
  TOPICS.forEach(t => {
    progress[t.id] = { attempted: 0, correct: 0, mastery: 0 };
  });
  return {
    screen: 'start',

    tableStatus: {},

    tableDiagDone: false,

    theme: 'papper',

function resetAll() {

function generateQuestion(topicId) {
  const gens = GENS[topicId];
  const gen = pick(gens);
  const q = gen();
  // Fixa mc-frågor som använder matchCorrect
  if (q.type === 'mc' && q.correctIndex === -1) {
    if (q.matchCorrect) {
      q.correctIndex = q.choices.findIndex(c => c === q.matchCorrect);
      if (q.correctIndex === -1) {
        // lägg till om den inte finns
        q.choices[0] = q.matchCorrect;
        q.correctIndex = 0;
      }
    } else {
      q.correctIndex = 0;
    }
  }
  return q;
}

/* ---- DIAGNOS ---- */
function startDiagnosis() {
  // 2 frågor per område = 12 frågor
  const qs = [];
  TOPICS.forEach(t => {
    qs.push({ topic: t.id, q: generateQuestion(t.id) });
    qs.push({ topic: t.id, q: generateQuestion(t.id) });
  });
  state.diag = {
    questions: shuffle(qs),
    index: 0,
    answers: [],
  };
  state.screen = 'diagnosis';
  render();
}

function renderDiagnosis() {
  const d = state.diag;
  const q = d.questions[d.index].q;
  const topic = d.questions[d.index].topic;
  progLabel().textContent = `Start-koll: ${d.index + 1} / ${d.questions.length}`;
  app().innerHTML = `
    <div class="card fade">
      <div class="muted" style="margin-bottom:4px;">Fråga ${d.index + 1} av ${d.questions.length}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.figure || ''}
      ${renderQuestionInput(q)}
      <div id="fb"></div>
      <div class="row end" style="margin-top:18px;">
        <button id="submitBtn">Svara</button>
      </div>
    </div>
  `;
  wireQuestion(q, (correct) => {
    d.answers.push({ topic, correct });
    document.getElementById('submitBtn').textContent = 'Nästa';
    document.getElementById('submitBtn').onclick = () => {
      d.index++;
      if (d.index >= d.questions.length) finishDiagnosis();
      else render();
    };
  });
}

function finishDiagnosis() {
  const d = state.diag;
  const byTopic = {};
  TOPICS.forEach(t => byTopic[t.id] = { correct: 0, total: 0 });
  d.answers.forEach(a => {
    byTopic[a.topic].total++;
    if (a.correct) byTopic[a.topic].correct++;
  });
  state.diagResults = byTopic;
  state.diagnosisDone = true;
  // uppdatera initial mastery lätt
  TOPICS.forEach(t => {
    const r = byTopic[t.id];
    state.progress[t.id].mastery = r.correct * 10; // max 20 från diagnos
  });
  state.screen = 'diagnosisResult';
  render();
}

function startPractice(topicId) {

  state.currentQ = generateQuestion(state.currentTopic);

  const topic = TOPICS.find(t => t.id === state.currentTopic);

  progLabel().textContent = `${topic.name}`;

  app().innerHTML = `

      ${renderQuestionInput(q)}

        <button class="ghost small" id="hintBtn">Visa ledtråd</button>
        <div class="spacer"></div>

        <button id="submitBtn">Svara</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <strong>Din koll på området</strong>
        <span class="muted">${Math.min(100, p.mastery)} / 100</span>
      </div>
      <div class="bar" style="margin-top:8px; height:6px; background:var(--line); border-radius:3px; overflow:hidden;">
        <span style="display:block; height:100%; width:${Math.min(100, p.mastery)}%; background:var(--good); transition:width 0.4s ease;"></span>
      </div>
      <div class="muted" style="margin-top:10px; font-size:14px;">
        När stapeln når ${state.diagnosisDone ? '80' : '100'} är du säker på området. Fortsätt tills dess!
      </div>
    </div>
  `;
  document.getElementById('hintBtn').onclick = () => {
    const hint = q.steps[0];
    document.getElementById('hintBtn').outerHTML = `<div class="hint-box"><strong>Ledtråd:</strong> ${hint}</div>`;
  };
  document.getElementById('quitBtn').onclick = () => {
    state.screen = 'topicMenu';
    render();
  };

  wireQuestion(q, (correct) => {
    pingStreak(); // ping streak vid svar
    state.sessionAttempted++;
    const pr = state.progress[state.currentTopic];
    pr.attempted++;
    if (correct) {
      state.sessionCorrect++;
      state.currentStreak++;
      pr.correct++;
      pr.mastery = Math.min(100, pr.mastery + 8);
      checkMilestones();
    } else {
      state.currentStreak = 0;
      pr.mastery = Math.max(0, pr.mastery - 3);
    }
    saveState();
    document.getElementById('submitBtn').textContent = 'Nästa fråga';
    document.getElementById('submitBtn').onclick = () => {
      // Auto-slutsats om masteri hög
      if (pr.mastery >= 80 && state.sessionAttempted >= 5) {
        state.screen = 'topicDone';
        render();
      } else {
        nextPracticeQuestion();
      }
    };
  });
}

/* ---- FINAL TEST ---- */
function startFinalTest() {
  const qs = [];
  // 2-3 från varje område, totalt 15
  const dist = { räknesätt: 2, tal: 3, algebra: 3, geometri: 3, samband: 2, statistik: 2, problem: 2 };
  Object.entries(dist).forEach(([topic, n]) => {
    for (let i = 0; i < n; i++) qs.push({ topic, q: generateQuestion(topic) });
  });
  state.final = {
    questions: shuffle(qs),
    index: 0,
    answers: [],
  };
  state.screen = 'finalTest';
  render();
}

function renderFinalTest() {
  const f = state.final;
  const q = f.questions[f.index].q;
  progLabel().textContent = `Slutprov: ${f.index + 1} / ${f.questions.length}`;
  app().innerHTML = `
    <div class="card fade">
      <div class="muted" style="margin-bottom:4px;">Fråga ${f.index + 1} av ${f.questions.length}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.figure || ''}
      ${renderQuestionInput(q)}
      <div id="fb"></div>
      <div class="row end" style="margin-top:18px;">
        <button id="submitBtn">Svara</button>
      </div>
      <div class="dots" style="justify-content:center; margin-top:20px;">
        ${f.questions.map((_, i) => `<div class="dot ${i <= f.index ? 'on' : ''}"></div>`).join('')}
      </div>
    </div>
  `;
  wireQuestion(q, (correct) => {
    f.answers.push({ topic: f.questions[f.index].topic, correct });
    document.getElementById('submitBtn').textContent = f.index + 1 >= f.questions.length ? 'Se resultat' : 'Nästa fråga';
    document.getElementById('submitBtn').onclick = () => {
      f.index++;
      if (f.index >= f.questions.length) finishFinalTest();
      else render();
    };
  });
}

function finishFinalTest() {
  const f = state.final;
  const correct = f.answers.filter(a => a.correct).length;
  const total = f.answers.length;
  const pct = Math.round(correct/total*100);
  const byTopic = {};
  TOPICS.forEach(t => byTopic[t.id] = { correct: 0, total: 0 });
  f.answers.forEach(a => {
    byTopic[a.topic].total++;
    if (a.correct) byTopic[a.topic].correct++;
  });
  state.finalResults = { correct, total, pct, byTopic };
  state.screen = 'finalResult';
  render();
}

function renderFinalResult() {
  progLabel().textContent = 'Slutprov klart';
  const r = state.finalResults;
  const godkänt = r.pct >= 60;
  const weakest = [...TOPICS].sort((a, b) => {
    const ra = r.byTopic[a.id], rb = r.byTopic[b.id];
    if (ra.total === 0) return 1;
    if (rb.total === 0) return -1;
    return (ra.correct/ra.total) - (rb.correct/rb.total);
  })[0];
  app().innerHTML = `
    <div class="card fade" style="text-align:center;">
      <h2>${godkänt ? 'Du är på god väg till godkänt!' : 'Bra försök – fortsätt träna.'}</h2>
      <div class="result-big">${r.correct} / ${r.total}</div>
      <div class="result-label">${r.pct} % rätt</div>
      <p style="margin-top:18px;">${godkänt
        ? 'Du klarar de flesta delar. Håll formen uppe genom att träna någon gång till innan provet.'
        : 'Du har flera områden som du fortfarande kan växa i. Fortsätt med träningen – särskilt på det som är svårast just nu.'}</p>
    </div>
    <div class="card">
      <h3>Så gick det per område</h3>
      ${TOPICS.map(t => {
        const br = r.byTopic[t.id];
        const pct = br.total === 0 ? 0 : Math.round(br.correct/br.total*100);
        return `
          <div style="margin:12px 0;">
            <div style="display:flex; justify-content:space-between; align-items:baseline;">
              <strong>${t.name}</strong>
              <span class="muted" style="font-variant-numeric:tabular-nums;">${br.correct}/${br.total}</span>
            </div>
            <div class="bar" style="margin-top:6px; height:4px; background:var(--line); border-radius:2px; overflow:hidden;">
              <span style="display:block; height:100%; width:${pct}%; background:${pct>=60?'var(--good)':'var(--accent)'};"></span>
            </div>
          </div>
        `;
      }).join('')}
      <p style="margin-top:20px;">Näst bästa steg: träna mer på <strong>${weakest.name}</strong>.</p>
      <div class="linkrow">
        <button id="trainWeak">Träna ${weakest.name}</button>
        <button class="ghost" id="toMenu">Till meny</button>
        <button class="ghost" id="retry">Gör om slutprovet</button>
      </div>
    </div>
  `;
  document.getElementById('trainWeak').onclick = () => startPractice(weakest.id);
  document.getElementById('toMenu').onclick = () => { state.screen = 'topicMenu'; render(); };
  document.getElementById('retry').onclick = startFinalTest;
}

    state.resonemangShowSolution = false;
    render();
  };
}

// Hjälpfunktion för att säkra textarea-innehåll
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function startTableDiag() {
  state.tableDiag = {
    pairs: shuffle(allTablePairs()),
    index: 0,
    results: [],
    startTime: null,
  };
  state.screen = 'tableDiag';
  render();
}

function renderTableDiag() {
  const d = state.tableDiag;
  if (d.index >= d.pairs.length) {
    finishTableDiag();
    return;
  }
  const [a, b] = d.pairs[d.index];
  progLabel().textContent = `Kollen: ${d.index + 1} / ${d.pairs.length}`;
  app().innerHTML = `
    <div class="card fade">
      <div class="muted" style="margin-bottom:4px;">Fråga ${d.index + 1} av ${d.pairs.length}</div>
      <div class="table-big-prompt">${a} · ${b} = ?</div>
      <input class="table-answer-input" id="tableAns" type="text" inputmode="numeric" autocomplete="off" />
      <div class="row end" style="margin-top:20px;">
        <button id="submitTable">Svara</button>
      </div>
      <div id="tableFb"></div>
    </div>
    <div class="card">
      <div class="muted" style="font-size:14px;">
        Ta den tid du behöver — vi mäter både om du kan och hur snabbt.
      </div>
    </div>
  `;
  d.startTime = Date.now();
  const input = document.getElementById('tableAns');
  input.focus();
  const submit = () => {
    const v = parseInt(input.value);
    if (isNaN(v)) return;
    const timeMs = Date.now() - d.startTime;
    const correct = v === a * b;
    d.results.push({ a, b, correct, timeMs });
    // Uppdatera status
    updatePairStatus(a, b, correct, timeMs);
    saveState();
    // Visa feedback kort
    const fb = document.getElementById('tableFb');
    const fast = timeMs < 3000;
    fb.innerHTML = correct
      ? `<div class="feedback good"><span class="tag">Rätt${fast ? ' och snabbt!' : ''}</span>${a} · ${b} = ${a*b}</div>`
      : `<div class="feedback bad"><span class="tag">Fel</span>Rätt svar: ${a} · ${b} = <strong>${a*b}</strong></div>`;
    input.disabled = true;
    document.getElementById('submitTable').textContent = 'Nästa';
    document.getElementById('submitTable').onclick = () => {
      d.index++;
      render();
    };
  };
  document.getElementById('submitTable').onclick = submit;
  input.onkeydown = e => { if (e.key === 'Enter') submit(); };
}

function finishTableDiag() {
  const d = state.tableDiag;
  const correct = d.results.filter(r => r.correct).length;
  const fast = d.results.filter(r => r.correct && r.timeMs < 3000).length;

    const v = parseInt(input.value);

    const timeMs = Date.now() - t.current.startTime;

// Visa uppställning med möjlighet att highlighta olika steg
function renderUppstallning(a, b, operator, highlight, minne1, minne2, result) {
  const aStr = String(a);
  const bStr = String(b);
  const width = Math.max(aStr.length, bStr.length, result ? String(result).length : 0) + 1;
  const pad = (s) => s.padStart(width, ' ');
  const resultStr = result != null ? pad(String(result)) : '';
  // Minnessiffror ovanför
  let minneLine = '';
  if (minne1 || minne2) {
    let arr = new Array(width).fill(' ');
    if (minne1) arr[arr.length - 2] = String(minne1);
    if (minne2) arr[arr.length - 3] = String(minne2);
    minneLine = arr.join('');
  }
  return `
    <div class="uppstallning">
      <div class="minne">${minneLine || '&nbsp;'}</div>
      <div class="row">${pad(aStr)}</div>
      <div class="row">${operator}${pad(bStr).substring(1)}</div>
      <div class="line"></div>
      <div class="row">${resultStr || '&nbsp;'.repeat(width)}</div>
    </div>
  `;
}

// Generera uppgifter för en given dag, baserat på metod
function generatePlanDayQuestions(day) {
  const qs = [];
  switch (day.method) {
    case 'addition-huvud':
      for (let i = 0; i < 6; i++) {
        const a = rand(15, 85);
        const b = rand(15, 85);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} + ${b}</span>`, answer: a + b,
          steps: [
            `Dela upp: ${a} = ${Math.floor(a/10)*10} + ${a%10}, och ${b} = ${Math.floor(b/10)*10} + ${b%10}.`,
            `Tiotalen: ${Math.floor(a/10)*10} + ${Math.floor(b/10)*10} = ${Math.floor(a/10)*10 + Math.floor(b/10)*10}.`,
            `Entalen: ${a%10} + ${b%10} = ${a%10 + b%10}.`,
            `Summa: ${a + b}.`
          ]});
      }
      break;
    case 'addition-uppstallning':
      for (let i = 0; i < 5; i++) {
        const a = rand(100, 699);
        const b = rand(100, 499);
        qs.push({ type: 'input', prompt: `Ställ upp och räkna: <span class="math">${a} + ${b}</span>`, answer: a + b,
          needsPaper: true,
          steps: [
            `Ställ upp talen under varandra. Ental under ental, tiotal under tiotal.`,
            `Räkna från höger. Entalen: ${a%10} + ${b%10} = ${a%10 + b%10}${(a%10 + b%10) >= 10 ? ' (minnessiffra 1)' : ''}.`,
            `Fortsätt med tiotal och hundratal på samma sätt.`,
            `Svar: ${a + b}.`
          ]});
      }
      break;
    case 'addition-blandat':
      for (let i = 0; i < 6; i++) {
        const small = Math.random() < 0.5;
        const a = small ? rand(15, 85) : rand(100, 599);
        const b = small ? rand(15, 85) : rand(100, 499);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} + ${b}</span>`, answer: a + b,
          needsPaper: !small,
          steps: [ small ? `Huvudräkning: dela upp i tiotal och ental.` : `Ställ upp på papper.`, `Svar: ${a + b}.` ]});
      }
      break;
    case 'subtraktion-huvud':
      for (let i = 0; i < 6; i++) {
        const a = rand(40, 99);
        const b = rand(15, a - 5);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} − ${b}</span>`, answer: a - b,
          steps: [
            `Dela upp ${b} = ${Math.floor(b/10)*10} + ${b%10}.`,
            `${a} − ${Math.floor(b/10)*10} = ${a - Math.floor(b/10)*10}.`,
            `${a - Math.floor(b/10)*10} − ${b%10} = ${a - b}.`,
            `Svar: ${a - b}.`
          ]});
      }
      break;
    case 'subtraktion-uppstallning':
      for (let i = 0; i < 5; i++) {
        const a = rand(300, 899);
        const b = rand(100, a - 50);
        qs.push({ type: 'input', prompt: `Ställ upp och räkna: <span class="math">${a} − ${b}</span>`, answer: a - b,
          needsPaper: true,
          steps: [
            `Ställ upp. Räkna från höger.`,
            `Om entalet undertill är större än det ovanpå: låna från tiotalet.`,
            `Svar: ${a - b}.`
          ]});
      }
      break;
    case 'subtraktion-blandat':
      for (let i = 0; i < 6; i++) {
        const small = Math.random() < 0.5;
        const a = small ? rand(40, 99) : rand(200, 799);
        const b = small ? rand(15, a - 5) : rand(50, a - 50);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} − ${b}</span>`, answer: a - b,
          needsPaper: !small,
          steps: [ `Svar: ${a - b}.` ]});
      }
      break;
    case 'veckoprov-1':
      for (let i = 0; i < 8; i++) {
        const op = pick(['+', '−']);
        const a = rand(50, 599);
        const b = op === '+' ? rand(50, 399) : rand(30, a - 20);
        const ans = op === '+' ? a + b : a - b;
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} ${op} ${b}</span>`, answer: ans,
          needsPaper: a > 99 || b > 99,
          steps: [ `Svar: ${ans}.` ]});
      }
      break;
    case 'multiplikation-tabell':
      for (let i = 0; i < 8; i++) {
        const a = rand(2, 9);
        const b = rand(2, 9);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} · ${b}</span>`, answer: a * b,
          steps: [ `${a} · ${b} = ${a*b}.`, `Sitter tabellen? Annars: träna modulen "Multiplikationstabellen".` ]});
      }
      break;
    case 'multiplikation-uppstallning':
      for (let i = 0; i < 5; i++) {
        const a = rand(13, 89);
        const b = rand(3, 9);
        qs.push({ type: 'input', prompt: `Ställ upp och räkna: <span class="math">${a} · ${b}</span>`, answer: a * b,
          needsPaper: true,
          steps: [
            `Ställ upp: ${a} med ${b} under entalet.`,
            `Multiplicera entalet först: ${b} · ${a%10} = ${b*(a%10)}.`,
            `Sedan tiotalet: ${b} · ${Math.floor(a/10)} = ${b*Math.floor(a/10)}.`,
            `Svar: ${a*b}.`
          ]});
      }
      break;
    case 'multiplikation-blandat':
      for (let i = 0; i < 6; i++) {
        const small = Math.random() < 0.5;
        const a = small ? rand(2, 9) : rand(13, 79);
        const b = small ? rand(2, 9) : rand(3, 9);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} · ${b}</span>`, answer: a * b,
          needsPaper: !small,
          steps: [ `Svar: ${a*b}.` ]});
      }
      break;
    case 'division-kort':
      for (let i = 0; i < 6; i++) {
        const b = rand(2, 9);
        const svar = rand(3, 9);
        const a = b * svar;
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} ÷ ${b}</span>`, answer: svar,
          steps: [
            `Fråga dig: "${b} · vad = ${a}?"`,
            `Från tabellen: ${b} · ${svar} = ${a}.`,
            `Svar: ${svar}.`
          ]});
      }
      break;
    case 'division-rest':
      for (let i = 0; i < 6; i++) {
        const b = rand(3, 8);
        const hela = rand(3, 9);
        const rest = rand(1, b - 1);
        const a = b * hela + rest;
        qs.push({ type: 'input', prompt: `<span class="math">${a} ÷ ${b}</span>. Hur många hela? (Ignorera resten, skriv bara heltalssvaret)`, answer: hela,
          needsPaper: true,
          steps: [
            `Hitta största tal i ${b}-ans tabell som inte är större än ${a}.`,
            `${b} · ${hela} = ${b*hela}.`,
            `Rest: ${a} − ${b*hela} = ${rest}.`,
            `Hela svaret: ${hela} rest ${rest}.`
          ]});
      }
      break;
    case 'rakneordning':
      for (let i = 0; i < 6; i++) {
        const variant = i % 3;
        if (variant === 0) {
          const a = rand(2, 6), b = rand(2, 9), c = rand(2, 8);
          qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} + ${b} · ${c}</span>`, answer: a + b * c,
            steps: [ `Multiplikation före addition.`, `${b} · ${c} = ${b*c}.`, `${a} + ${b*c} = ${a + b*c}.` ]});
        } else if (variant === 1) {
          const a = rand(2, 6), b = rand(2, 8), c = rand(2, 6);
          qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">(${a} + ${b}) · ${c}</span>`, answer: (a + b) * c,
            steps: [ `Parenteser först.`, `${a} + ${b} = ${a+b}.`, `${a+b} · ${c} = ${(a+b)*c}.` ]});
        } else {
          const b = rand(2, 5), svar = rand(3, 8), a = b * svar, c = rand(1, svar - 1);
          qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} ÷ ${b} − ${c}</span>`, answer: svar - c,
            steps: [ `Division före subtraktion.`, `${a} ÷ ${b} = ${svar}.`, `${svar} − ${c} = ${svar - c}.` ]});
        }
      }
      break;
    case 'slutprov-14':
      for (let i = 0; i < 10; i++) {
        const op = pick(['+', '−', '·', '÷']);
        let a, b, ans;
        if (op === '+') { a = rand(50, 599); b = rand(50, 399); ans = a + b; }
        else if (op === '−') { a = rand(100, 899); b = rand(50, a - 50); ans = a - b; }
        else if (op === '·') { a = rand(12, 79); b = rand(3, 9); ans = a * b; }
        else { b = rand(2, 9); const s = rand(3, 9); a = b * s; ans = s; }
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} ${op} ${b}</span>`, answer: ans,
          needsPaper: true, steps: [ `Svar: ${ans}.` ]});
      }
      break;
    default:
      // Fallback
      for (let i = 0; i < 5; i++) {
        const a = rand(10, 50), b = rand(10, 50);
        qs.push({ type: 'input', prompt: `Räkna ut: <span class="math">${a} + ${b}</span>`, answer: a+b, steps: [`Svar: ${a+b}.`]});
      }
  }
  return qs;
}

function finishPlanDay() {
  const day = PLAN_14[state.plan14.currentDay - 1];
  const pp = state.planPractice || { correct: 0, total: 0 };
  const dayNum = day.day;

  // Markera dagen som klar
  if (!state.plan14.completedDays.includes(dayNum)) {
    state.plan14.completedDays.push(dayNum);
  }
  state.plan14.lastDayDate = todayStr();
  state.plan14.dayStats[dayNum] = {
    correct: pp.correct,
    total: pp.total,
    date: todayStr(),
  };
  saveState();
  state.screen = 'planDayDone';
  render();
}

function renderUtrakningN1() {
  const idx = state.utrakningIdx || 0;
  const u = UTRAKNING_NIVA1[idx];
  progLabel().textContent = `Nivå 1: ${idx + 1} / ${UTRAKNING_NIVA1.length}`;

  // Initiera lokalt steg-state om det inte finns
  if (!state.utrakningState || state.utrakningState.id !== u.id) {
    state.utrakningState = {
      id: u.id,
      stepStatus: u.steg.map(() => 'pending'), // 'pending', 'done'
      finalDone: false,
    };
  }
  const us = state.utrakningState;

  // Bygg HTML för stegen
  let stegHtml = '';
  u.steg.forEach((s, i) => {
    const done = us.stepStatus[i] === 'done';
    const prevDone = i === 0 || us.stepStatus[i - 1] === 'done';
    const cls = done ? 'done' : (prevDone ? '' : 'locked');
    let row = `<div class="step-block ${cls}" data-step="${i}">`;
    row += `<div class="substep-label">Steg ${i + 1}</div>`;
    row += `<div>${s.text}`;
    row += `<input class="step-input" data-input="1" data-step="${i}" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="?" />`;
    if (s.input2 != null) {
      row += s.suffix || '';
      row += `<input class="step-input" data-input="2" data-step="${i}" type="text" inputmode="text" autocomplete="off" placeholder="?" />`;
    } else if (s.suffix) {
      row += s.suffix;
    }
    if (s.result != null && s.input2 == null) {
      row += ` <span class="step-result">${s.result}</span>`;
      row += s.resultSuffix || '';
    } else if (s.result != null && s.input2 != null) {
      row += (s.resultPrefix || '') + ` <span class="step-result">${s.result}</span>`;
      row += s.resultSuffix || '';
    }
    row += `</div></div>`;
    stegHtml += row;
  });

  // Slutsvars-input
  const allStepsDone = us.stepStatus.every(s => s === 'done');
  const finalSvarText = u.svarText || `${u.svar}${u.enhet ? ' ' + u.enhet : ''}`;

  app().innerHTML = `
    <div class="card fade">
      <div class="muted" style="font-size:13px;">${u.område}</div>
      <h2 style="margin-top:2px;">Komplettera lösningen</h2>
      <p class="q-prompt" style="font-size:18px; margin-bottom:0;">${u.uppgift}</p>
    </div>

    <div class="card">
      <h3 style="margin-top:0; font-size:16px;">Fyll i de gula rutorna</h3>
      <p class="muted" style="font-size:14px;">Skriv in det som saknas. Tryck Enter eller klicka utanför rutan så kollar vi.</p>
      ${stegHtml}

      ${allStepsDone ? `
        <div class="step-block done" style="margin-top:18px;">
          <strong>Svar: ${finalSvarText}</strong>
        </div>
      ` : ''}

      ${u.tips ? `
        <div class="hint-box" style="margin-top:14px;">
          <strong>Tips:</strong> ${u.tips}
        </div>
      ` : ''}
    </div>

    <div class="linkrow">
      <button class="ghost" id="backMenu">Tillbaka</button>
      <div class="spacer"></div>
      ${idx > 0 ? `<button class="ghost" id="prevU">Förra</button>` : ''}
      ${idx < UTRAKNING_NIVA1.length - 1 ? `<button id="nextU">Nästa uppgift</button>` : `<button id="nextU">Tillbaka till menyn</button>`}
    </div>
  `;

  // Koppla input-fält
  document.querySelectorAll('.step-input').forEach(input => {
    const stepIdx = parseInt(input.dataset.step);
    const inputNum = parseInt(input.dataset.input);
    const checkInput = () => {
      const v = parseAnswer(input.value);
      if (isNaN(v)) return;
      const s = u.steg[stepIdx];
      const expected = inputNum === 1 ? s.input : s.input2;
      const correct = Math.abs(v - expected) < 0.001;
      if (correct) {
        input.classList.remove('wrong');
        input.classList.add('correct');
        input.disabled = true;
        // Kolla om alla inputs på detta steg är klara
        const stepInputs = document.querySelectorAll(`.step-input[data-step="${stepIdx}"]`);
        const allOk = Array.from(stepInputs).every(el => el.classList.contains('correct'));
        if (allOk) {
          us.stepStatus[stepIdx] = 'done';
          render();
        }
      } else {
        input.classList.remove('correct');
        input.classList.add('wrong');
        // Återställ efter en stund så eleven kan försöka igen
        setTimeout(() => {
          input.classList.remove('wrong');
        }, 1500);
      }
    };
    input.addEventListener('blur', checkInput);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkInput();
      }
    });
  });

  document.getElementById('backMenu').onclick = () => {
    state.utrakningState = null;
    state.screen = 'utrakningMenu';
    render();
  };
  const prevBtn = document.getElementById('prevU');
  if (prevBtn) prevBtn.onclick = () => {
    state.utrakningIdx = idx - 1;
    state.utrakningState = null;
    render();
  };
  const nextBtn = document.getElementById('nextU');
  if (nextBtn) nextBtn.onclick = () => {
    if (idx < UTRAKNING_NIVA1.length - 1) {
      state.utrakningIdx = idx + 1;
      state.utrakningState = null;
      render();
    } else {
      state.utrakningState = null;
      state.screen = 'utrakningMenu';
      render();
    }
  };

  // Fokusera första olåsta input
  setTimeout(() => {
    const firstOpen = document.querySelector('.step-input:not(.correct):not([disabled])');
    if (firstOpen) firstOpen.focus();
  }, 100);
}
