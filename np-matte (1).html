<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara NP i matte – åk 9</title>
<style>
  :root {

    --muted: #6b6359;

  input.answer {

  .feedback {

  .feedback.good .tag { color: var(--good); }

    background: rgba(255,255,255,0.55);

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row.end { justify-content: flex-end; }
  .spacer { flex: 1; }

  .topic-grid {
    display: grid;
    grid-template-columns: 1fr;

  @media (min-width: 560px) {

  .topic-btn .meta { font-size: 14px; color: var(--muted); margin-top: 4px; display: block; }

  svg.fig { display: block; margin: 8px 0 16px; }

  /* Staplade bråk */

    flex-direction: column;

  /* Resonemang */

  .teacher-log .log-row {

  .log-toggle:hover { opacity: 1; }
  .ext-link {

  }
  .ext-link:hover {
    background: var(--accent-soft);

  }
  .ext-link .lname {
    font-weight: 600;
    font-size: 16px;

  }
  .ext-link .ldesc {
    color: var(--muted);

  .ext-link .lurl {

  footer.site {
    margin-top: 40px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;

<body>
<div class="wrap">
  <header class="site">
    <h1>Klara NP – matte åk 9</h1>
    <div class="prog" id="progLabel">Välkommen</div>
  </header>

  <main id="app"></main>

  <footer class="site">
    <span>Ett träningsverktyg byggt för dig som vill bli godkänd.</span>
    <a id="resetBtn">Börja om från början</a>
  </footer>
</div>

<!-- Lärarloggbok - dold som standard, öppnas med knapp -->
<button class="log-toggle" id="logToggle" title="Lärarloggbok" style="display:none;">L</button>
<div class="teacher-log" id="teacherLog" style="display:none;">
  <h4>Lärarloggbok <span style="font-weight:400; text-transform:none; letter-spacing:0; color:#a39482;">— endast synlig för dig</span></h4>
  <textarea id="logInput" placeholder="Vad fastnade eleven på? Vad var otydligt? Vad saknades?"></textarea>
  <div class="log-row">
    <button id="logSave">Spara anteckning</button>
    <button class="ghost" id="logExport">Exportera alla</button>
    <button class="ghost" id="logClose">Dölj</button>
  </div>
  <div class="entries" id="logEntries"></div>
</div>

<script>
/* ============================================================
   KLARA NP – MATTE ÅK 9
   Ett komplett träningsverktyg för E-nivå.
   Bygger på: diagnos -> riktad träning -> blandat prov.
============================================================ */

const STATE_KEY = 'np_matte_state_v1';
const VERSION = 'v1.0 – 19 apr 2026';

// Hjälpfunktioner
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = arr => arr[rand(0, arr.length - 1)];
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const gcd = (a, b) => b === 0 ? Math.abs(a) : gcd(b, a % b);
const simplifyFrac = (n, d) => {
  const g = gcd(n, d);
  return [n / g, d / g];
};
const fmtNum = n => {
  if (Number.isInteger(n)) return String(n);
  return String(Math.round(n * 1000) / 1000).replace('.', ',');
};
const parseAnswer = s => {
  if (s == null) return NaN;
  return parseFloat(String(s).trim().replace(',', '.').replace(/\s/g, ''));
};

// Matematisk formatering
const frac = (n, d) => `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`;
const sup = (base, exp) => `${base}<sup>${exp}</sup>`;
const sq = base => `${base}²`;
const cube = base => `${base}³`;

/* ============================================================
   UPPGIFTSGENERATORER
   Varje generator returnerar ett objekt:
   {
     type: 'mc' | 'input',
     prompt: string (HTML tillåtet i .math-span),
     figure: optional SVG string,
     choices: [str,...]  (om mc),
     correctIndex: int   (om mc),
     answer: number      (om input, används med tolerans),
     tolerance: number   (default 0.001),
     steps: [str,...]    (lösningsgång)
   }
============================================================ */

const GENS = {
  // 1. TALUPPFATTNING
  tal: [
    // Procent av tal
    () => {
      const p = pick([10, 15, 20, 25, 30, 40, 50, 60, 75]);
      const base = pick([40, 60, 80, 120, 160, 200, 240, 300, 400, 500]);
      const ans = base * p / 100;
      return {
        type: 'input',
        prompt: `Hur mycket är <span class="math">${p} %</span> av <span class="math">${base}</span>?`,
        answer: ans,
        steps: [
          `${p} % betyder ${p} hundradelar, alltså ${p}/100 = ${p/100}.`,
          `Du räknar: ${base} · ${p/100} = ${fmtNum(ans)}.`,
          `Svar: ${fmtNum(ans)}`
        ]
      };
    },
    // Rabatt
    () => {
      const pris = pick([200, 250, 300, 400, 500, 600, 800, 1000, 1200]);
      const rabatt = pick([10, 15, 20, 25, 30, 40, 50]);
      const nyttPris = pris * (100 - rabatt) / 100;
      return {
        type: 'input',
        prompt: `En tröja kostar <span class="math">${pris} kr</span>. Den säljs med <span class="math">${rabatt} %</span> rabatt. Vad kostar den nu?`,
        answer: nyttPris,
        steps: [
          `Du betalar ${100 - rabatt} % av priset (${100}% − ${rabatt}% = ${100 - rabatt}%).`,
          `${pris} · ${(100 - rabatt)/100} = ${fmtNum(nyttPris)} kr.`,
          `Svar: ${fmtNum(nyttPris)} kr`
        ]
      };
    },
    // Bråk av helhet
    () => {
      const d = pick([3, 4, 5, 6, 8, 10]);
      const n = rand(1, d - 1);
      const helhet = d * pick([3, 4, 5, 6, 8, 10]);
      const ans = helhet * n / d;
      return {
        type: 'input',
        prompt: `Hur mycket är ${frac(n, d)} av <span class="math">${helhet}</span>?`,
        answer: ans,
        steps: [
          `Dela först ${helhet} i ${d} lika delar: ${helhet} ÷ ${d} = ${helhet/d}.`,
          `Ta sedan ${n} sådana delar: ${helhet/d} · ${n} = ${fmtNum(ans)}.`,
          `Svar: ${fmtNum(ans)}`
        ]
      };
    },
    // Negativa tal - addition/subtraktion
    () => {
      const a = rand(-15, -1);
      const b = rand(3, 12);
      const ans = a + b;
      return {
        type: 'input',
        prompt: `Räkna ut: <span class="math">${a} + ${b}</span>`,
        answer: ans,
        steps: [
          `Du står på ${a} på tallinjen och går ${b} steg åt höger (plus betyder höger).`,
          `${a} + ${b} = ${ans}.`,
          `Svar: ${ans}`
        ]
      };
    },
    () => {
      const a = rand(2, 12);
      const b = rand(3, 15);
      const ans = a - b;
      return {
        type: 'input',
        prompt: `Räkna ut: <span class="math">${a} − ${b}</span>`,
        answer: ans,
        steps: [
          `Du står på ${a} och går ${b} steg åt vänster (minus betyder vänster).`,
          `${a} − ${b} = ${ans}.`,
          `Svar: ${ans}`
        ]
      };
    },
    // Decimaltal jämförelse
    () => {
      const tal = shuffle([
        (rand(10, 99) / 10).toFixed(1),
        (rand(100, 999) / 100).toFixed(2),
        (rand(1, 9) + rand(0, 9) / 10).toFixed(1),
        (rand(1, 9) + rand(0, 99) / 100).toFixed(2)
      ]).slice(0, 4);
      const values = tal.map(t => parseFloat(t));
      const maxVal = Math.max(...values);
      const correct = tal[values.indexOf(maxVal)].replace('.', ',');
      const choices = tal.map(t => t.replace('.', ','));
      return {
        type: 'mc',
        prompt: `Vilket tal är störst?`,
        choices,
        correctIndex: choices.indexOf(correct),
        steps: [
          `Jämför först heltalsdelen (det som står före kommatecknet).`,
          `Om de är lika, jämför tiondelar, sedan hundradelar.`,
          `${correct} är störst.`
        ]
      };
    },
    // Bråk till decimal
    () => {
      const pairs = [
        [1, 2, 0.5], [1, 4, 0.25], [3, 4, 0.75],
        [1, 5, 0.2], [2, 5, 0.4], [3, 5, 0.6], [4, 5, 0.8],
        [1, 10, 0.1], [3, 10, 0.3], [7, 10, 0.7]
      ];
      const [n, d, ans] = pick(pairs);
      return {
        type: 'input',

      const v = pick(varianter);

        frac(blå, röda),
        frac(1, totalt),
        frac(totalt, röda),

        steps: [
          `${summa} ÷ 3 = ${ans} kr.`,
          `Kontroll: 3 · ${ans} = ${3*ans}. Stämmer.`,
          `Svar: ${ans} kr`
        ]
      };
    },
    // Hyra bil per dag
    () => {
      const dagpris = pick([250, 300, 400, 500]);
      const dagar = pick([3, 4, 5, 7]);
      const kmPris = pick([1, 2, 3]);
      const km = pick([100, 200, 300, 500]);
      const ans = dagpris * dagar + kmPris * km;
      return {
        type: 'input',
        prompt: `En bil hyrs för <span class="math">${dagpris} kr/dag</span> plus <span class="math">${kmPris} kr/km</span>. Hur mycket kostar det att hyra i <span class="math">${dagar} dagar</span> och köra <span class="math">${km} km</span>?`,
        answer: ans,
        steps: [
          `Kostnad för dagar: ${dagpris} · ${dagar} = ${dagpris*dagar} kr.`,
          `Kostnad för km: ${kmPris} · ${km} = ${kmPris*km} kr.`,
          `Totalt: ${dagpris*dagar} + ${kmPris*km} = ${ans} kr.`
        ]
      };
    },
    // Väggtapetsering
    () => {
      const b = pick([3, 4, 5, 6]);
      const h = pick([2, 3, 4]);
      const rullBredd = 1;
      const rullLängd = pick([5, 10]);
      const area = b * h;
      const rullArea = rullBredd * rullLängd;
      const ans = Math.ceil(area / rullArea);
      return {
        type: 'input',
        prompt: `En vägg är <span class="math">${b} m</span> bred och <span class="math">${h} m</span> hög. En tapetrulle räcker till <span class="math">${rullArea} m²</span>. Hur många rullar behövs (minst)?`,
        answer: ans,
        steps: [
          `Vägens area: ${b} · ${h} = ${area} m².`,
          `${area} ÷ ${rullArea} = ${fmtNum(area/rullArea)}.`,
          `Du kan inte köpa delar av rullar, så du behöver ${ans} rullar.`
        ]
      };
    },
    // Recept - räkna om
    () => {
      // Välj orig och ny så att ny/orig alltid blir ett snällt tal
      const pairs = [[2, 4], [2, 6], [2, 8], [3, 6], [3, 9], [4, 8], [4, 12], [2, 10]];
      const [orig, ny] = pick(pairs);
      const mjöl = pick([100, 150, 200, 300]);
      const ans = mjöl * ny / orig;
      return {
        type: 'input',
        prompt: `Ett recept för <span class="math">${orig}</span> personer kräver <span class="math">${mjöl} g</span> mjöl. Hur mycket mjöl behövs för <span class="math">${ny}</span> personer?`,
        answer: ans,
        steps: [
          `Per person: ${mjöl} ÷ ${orig} = ${mjöl/orig} g.`,
          `För ${ny} personer: ${mjöl/orig} · ${ny} = ${ans} g.`,
          `Svar: ${ans} g`
        ]
      };
    },
    // Spara till
    () => {
      const mål = pick([1200, 2400, 3600, 4800]);
      const perVecka = pick([100, 200, 300, 400]);
      const ans = mål / perVecka;
      return {
        type: 'input',
        prompt: `Du vill spara <span class="math">${mål} kr</span>. Du sparar <span class="math">${perVecka} kr i veckan</span>. Hur många veckor tar det?`,
        answer: ans,
        steps: [
          `${mål} ÷ ${perVecka} = ${ans} veckor.`,
          `Kontroll: ${ans} · ${perVecka} = ${ans*perVecka} kr. Stämmer.`,
          `Svar: ${ans} veckor`
        ]
      };
    },
  ],
};

function svgRect(b, h, label) {
  const scale = 14;
  const w = b * scale;
  const hh = h * scale;
  const pad = 30;
  return `<svg class="fig" width="${w+2*pad}" height="${hh+2*pad}" viewBox="0 0 ${w+2*pad} ${hh+2*pad}">
    <rect x="${pad}" y="${pad}" width="${w}" height="${hh}" fill="#e8dccf" stroke="#1f1b16" stroke-width="1.5"/>
    <text x="${pad+w/2}" y="${pad+hh+18}" text-anchor="middle" font-size="13" fill="#6b6359">${b} cm</text>
    <text x="${pad-8}" y="${pad+hh/2+4}" text-anchor="end" font-size="13" fill="#6b6359">${h} cm</text>
  </svg>`;
}
function svgTriangle(b, h) {
  const scale = 14;
  const w = b * scale;
  const hh = h * scale;
  const pad = 30;
  return `<svg class="fig" width="${w+2*pad}" height="${hh+2*pad}" viewBox="0 0 ${w+2*pad} ${hh+2*pad}">
    <polygon points="${pad},${pad+hh} ${pad+w},${pad+hh} ${pad+w/2},${pad}" fill="#e8dccf" stroke="#1f1b16" stroke-width="1.5"/>
    <line x1="${pad+w/2}" y1="${pad}" x2="${pad+w/2}" y2="${pad+hh}" stroke="#1f1b16" stroke-dasharray="3,3" stroke-width="1"/>
    <text x="${pad+w/2}" y="${pad+hh+18}" text-anchor="middle" font-size="13" fill="#6b6359">${b} cm</text>
    <text x="${pad+w/2+6}" y="${pad+hh/2+4}" font-size="13" fill="#6b6359">${h} cm</text>
  </svg>`;
}
function svgCircle(r) {
  const scale = 14;
  const R = r * scale;
  const pad = 30;
  const cx = R + pad, cy = R + pad;
  return `<svg class="fig" width="${2*R+2*pad}" height="${2*R+2*pad}" viewBox="0 0 ${2*R+2*pad} ${2*R+2*pad}">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="#e8dccf" stroke="#1f1b16" stroke-width="1.5"/>
    <line x1="${cx}" y1="${cy}" x2="${cx+R}" y2="${cy}" stroke="#1f1b16" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="2" fill="#1f1b16"/>
    <text x="${cx+R/2}" y="${cy-5}" text-anchor="middle" font-size="13" fill="#6b6359">${r} cm</text>
  </svg>`;
}
function svgRightTriangle(a, b) {
  const scale = 10;
  const w = b * scale;
  const hh = a * scale;
  const pad = 30;
  return `<svg class="fig" width="${w+2*pad}" height="${hh+2*pad}" viewBox="0 0 ${w+2*pad} ${hh+2*pad}">
    <polygon points="${pad},${pad+hh} ${pad+w},${pad+hh} ${pad},${pad}" fill="#e8dccf" stroke="#1f1b16" stroke-width="1.5"/>
    <rect x="${pad}" y="${pad+hh-10}" width="10" height="10" fill="none" stroke="#1f1b16" stroke-width="1"/>
    <text x="${pad-8}" y="${pad+hh/2+4}" text-anchor="end" font-size="13" fill="#6b6359">${a} cm</text>
    <text x="${pad+w/2}" y="${pad+hh+18}" text-anchor="middle" font-size="13" fill="#6b6359">${b} cm</text>
    <text x="${pad+w/2+5}" y="${pad+hh/2-2}" font-size="13" fill="#6b6359">c?</text>
  </svg>`;
}
function svgBarChart(labels, values) {
  const w = 320, h = 160;
  const pad = 30;
  const max = Math.max(...values);
  const barW = (w - 2*pad) / values.length - 12;
  return `<svg class="fig" width="${w}" height="${h+30}" viewBox="0 0 ${w} ${h+30}">
    <line x1="${pad}" y1="${h-10}" x2="${w-pad}" y2="${h-10}" stroke="#1f1b16" stroke-width="1.5"/>
    <line x1="${pad}" y1="10" x2="${pad}" y2="${h-10}" stroke="#1f1b16" stroke-width="1.5"/>
    ${values.map((v, i) => {
      const barH = (v / max) * (h - 40);
      const x = pad + 10 + i * ((w - 2*pad) / values.length);
      return `
        <rect x="${x}" y="${h-10-barH}" width="${barW}" height="${barH}" fill="#8a3a1f"/>
        <text x="${x+barW/2}" y="${h+5}" text-anchor="middle" font-size="12" fill="#1f1b16">${labels[i]}</text>
        <text x="${x+barW/2}" y="${h-15-barH}" text-anchor="middle" font-size="11" fill="#6b6359">${v}</text>
      `;
    }).join('')}
  </svg>`;
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrera - se till att nya fält finns
      if (!parsed.resonemangTexts) parsed.resonemangTexts = {};
      if (!parsed.teacherLog) parsed.teacherLog = [];
      return parsed;
    }
  } catch (e) {}
  return defaultState();
}
function defaultState() {
  const progress = {};
  TOPICS.forEach(t => {
    progress[t.id] = { attempted: 0, correct: 0, mastery: 0 };
  });
  return {
    screen: 'start',
    diagnosisDone: false,
    progress,
    currentTopic: null,
    currentQ: null,
    currentStreak: 0,
    sessionAttempted: 0,
    sessionCorrect: 0,
    diagResults: null,
    finalResults: null,
    // Sparad text för resonemangsuppgifter (per id)
    resonemangTexts: {},
    // Lärarloggbok — anteckningar under testvecka
    teacherLog: [],
  };
}
function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
  catch (e) {}
}
function resetAll() {
  state = defaultState();
  saveState();
  render();
}

function generateQuestion(topicId) {
  const gens = GENS[topicId];
  const gen = pick(gens);
  const q = gen();
  // Fixa mc-frågor som använder matchCorrect
  if (q.type === 'mc' && q.correctIndex === -1) {
    if (q.matchCorrect) {
      q.correctIndex = q.choices.findIndex(c => c === q.matchCorrect);
      if (q.correctIndex === -1) {
        // lägg till om den inte finns
        q.choices[0] = q.matchCorrect;
        q.correctIndex = 0;
      }
    } else {
      q.correctIndex = 0;
    }
  }
  return q;
}

function app() { return document.getElementById('app'); }
function progLabel() { return document.getElementById('progLabel'); }

function render() {
  saveState();
  const screens = {
    start: renderStart,
    diagnosis: renderDiagnosis,
    diagnosisResult: renderDiagnosisResult,
    topicMenu: renderTopicMenu,
    practice: renderPractice,
    topicDone: renderTopicDone,
    finalTest: renderFinalTest,
    finalResult: renderFinalResult,
    strategier: renderStrategier,
    resonemangList: renderResonemangList,
    resonemang: renderResonemang,
    npProv: renderNPProv,
  };
  const fn = screens[state.screen] || renderStart;
  fn();
}

/* ---- DIAGNOS ---- */
function startDiagnosis() {
  // 2 frågor per område = 12 frågor
  const qs = [];
  TOPICS.forEach(t => {
    qs.push({ topic: t.id, q: generateQuestion(t.id) });
    qs.push({ topic: t.id, q: generateQuestion(t.id) });
  });
  state.diag = {
    questions: shuffle(qs),
    index: 0,
    answers: [],
  };
  state.screen = 'diagnosis';
  render();
}

function renderDiagnosis() {
  const d = state.diag;
  const q = d.questions[d.index].q;
  const topic = d.questions[d.index].topic;
  progLabel().textContent = `Start-koll: ${d.index + 1} / ${d.questions.length}`;
  app().innerHTML = `
    <div class="card fade">
      <div class="muted" style="margin-bottom:4px;">Fråga ${d.index + 1} av ${d.questions.length}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.figure || ''}
      ${renderQuestionInput(q)}
      <div id="fb"></div>
      <div class="row end" style="margin-top:18px;">
        <button id="submitBtn">Svara</button>
      </div>
    </div>
  `;
  wireQuestion(q, (correct) => {
    d.answers.push({ topic, correct });
    document.getElementById('submitBtn').textContent = 'Nästa';
    document.getElementById('submitBtn').onclick = () => {
      d.index++;
      if (d.index >= d.questions.length) finishDiagnosis();
      else render();
    };
  });
}

function finishDiagnosis() {
  const d = state.diag;
  const byTopic = {};
  TOPICS.forEach(t => byTopic[t.id] = { correct: 0, total: 0 });
  d.answers.forEach(a => {
    byTopic[a.topic].total++;
    if (a.correct) byTopic[a.topic].correct++;
  });
  state.diagResults = byTopic;
  state.diagnosisDone = true;
  // uppdatera initial mastery lätt
  TOPICS.forEach(t => {
    const r = byTopic[t.id];
    state.progress[t.id].mastery = r.correct * 10; // max 20 från diagnos
  });
  state.screen = 'diagnosisResult';
  render();
}

function renderDiagnosisResult() {
  progLabel().textContent = 'Start-kollen klar';
  const results = state.diagResults;
  const sorted = [...TOPICS].sort((a, b) => {
    const ra = results[a.id], rb = results[b.id];
    return (ra.correct/ra.total) - (rb.correct/rb.total);
  });
  const weakest = sorted[0];
  app().innerHTML = `
    <div class="card fade">
      <h2>Bra jobbat, start-kollen är klar!</h2>
      <p class="lead">Här är vad du redan kan och vad som är nästa steg.</p>
      ${TOPICS.map(t => {
        const r = results[t.id];
        const pct = Math.round(r.correct/r.total*100);
        return `
          <div style="margin:12px 0; padding-bottom:12px; border-bottom:1px solid var(--line);">
            <div style="display:flex; justify-content:space-between; align-items:baseline;">
              <strong>${t.name}</strong>
              <span class="muted" style="font-variant-numeric:tabular-nums;">${r.correct}/${r.total} rätt</span>
            </div>
            <div class="bar" style="margin-top:6px; height:4px; background:var(--line); border-radius:2px; overflow:hidden;">
              <span style="display:block; height:100%; width:${pct}%; background:${pct>=50?'var(--good)':'var(--accent)'};"></span>
            </div>
          </div>

/* ---- PRACTICE ---- */
function startPractice(topicId) {
  state.currentTopic = topicId;
  state.currentStreak = 0;
  state.sessionAttempted = 0;
  state.sessionCorrect = 0;
  nextPracticeQuestion();
}
function nextPracticeQuestion() {
  state.currentQ = generateQuestion(state.currentTopic);
  state.screen = 'practice';
  render();
}

function renderPractice() {
  const topic = TOPICS.find(t => t.id === state.currentTopic);
  const p = state.progress[state.currentTopic];
  progLabel().textContent = `${topic.name}`;
  const q = state.currentQ;
  app().innerHTML = `
    <div class="card fade">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;">
        <div class="muted">${topic.name} – träning</div>
        <div class="muted" style="font-variant-numeric:tabular-nums;">
          Rätt: ${state.sessionCorrect}/${state.sessionAttempted}
        </div>
      </div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.figure || ''}
      ${renderQuestionInput(q)}
      <div id="fb"></div>
      <div class="row" style="margin-top:18px;">
        <button class="ghost small" id="hintBtn">Visa ledtråd</button>
        <div class="spacer"></div>
        <button class="ghost small" id="quitBtn">Byt område</button>
        <button id="submitBtn">Svara</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <strong>Din koll på området</strong>
        <span class="muted">${Math.min(100, p.mastery)} / 100</span>
      </div>
      <div class="bar" style="margin-top:8px; height:6px; background:var(--line); border-radius:3px; overflow:hidden;">
        <span style="display:block; height:100%; width:${Math.min(100, p.mastery)}%; background:var(--good); transition:width 0.4s ease;"></span>
      </div>
      <div class="muted" style="margin-top:10px; font-size:14px;">
        När stapeln når ${state.diagnosisDone ? '80' : '100'} är du säker på området. Fortsätt tills dess!
      </div>
    </div>
  `;
  document.getElementById('hintBtn').onclick = () => {
    const hint = q.steps[0];
    document.getElementById('hintBtn').outerHTML = `<div class="hint-box"><strong>Ledtråd:</strong> ${hint}</div>`;
  };
  document.getElementById('quitBtn').onclick = () => {
    state.screen = 'topicMenu';
    render();
  };

  wireQuestion(q, (correct) => {
    state.sessionAttempted++;
    const pr = state.progress[state.currentTopic];
    pr.attempted++;
    if (correct) {
      state.sessionCorrect++;
      state.currentStreak++;
      pr.correct++;
      pr.mastery = Math.min(100, pr.mastery + 8);
    } else {
      state.currentStreak = 0;
      pr.mastery = Math.max(0, pr.mastery - 3);
    }
    saveState();
    document.getElementById('submitBtn').textContent = 'Nästa fråga';
    document.getElementById('submitBtn').onclick = () => {
      // Auto-slutsats om masteri hög
      if (pr.mastery >= 80 && state.sessionAttempted >= 5) {
        state.screen = 'topicDone';
        render();
      } else {
        nextPracticeQuestion();
      }
    };
  });
}

function renderTopicDone() {
  const topic = TOPICS.find(t => t.id === state.currentTopic);

/* ---- FINAL TEST ---- */
function startFinalTest() {
  const qs = [];
  // 2-3 från varje område, totalt 15
  const dist = { tal: 3, algebra: 3, geometri: 3, samband: 2, statistik: 2, problem: 2 };
  Object.entries(dist).forEach(([topic, n]) => {
    for (let i = 0; i < n; i++) qs.push({ topic, q: generateQuestion(topic) });
  });
  state.final = {
    questions: shuffle(qs),
    index: 0,
    answers: [],
  };
  state.screen = 'finalTest';
  render();
}

function renderFinalTest() {
  const f = state.final;
  const q = f.questions[f.index].q;
  progLabel().textContent = `Slutprov: ${f.index + 1} / ${f.questions.length}`;
  app().innerHTML = `
    <div class="card fade">
      <div class="muted" style="margin-bottom:4px;">Fråga ${f.index + 1} av ${f.questions.length}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.figure || ''}
      ${renderQuestionInput(q)}
      <div id="fb"></div>
      <div class="row end" style="margin-top:18px;">
        <button id="submitBtn">Svara</button>
      </div>
      <div class="dots" style="justify-content:center; margin-top:20px;">
        ${f.questions.map((_, i) => `<div class="dot ${i <= f.index ? 'on' : ''}"></div>`).join('')}
      </div>
    </div>
  `;
  wireQuestion(q, (correct) => {
    f.answers.push({ topic: f.questions[f.index].topic, correct });
    document.getElementById('submitBtn').textContent = f.index + 1 >= f.questions.length ? 'Se resultat' : 'Nästa fråga';
    document.getElementById('submitBtn').onclick = () => {
      f.index++;
      if (f.index >= f.questions.length) finishFinalTest();
      else render();
    };
  });
}

function finishFinalTest() {
  const f = state.final;
  const correct = f.answers.filter(a => a.correct).length;
  const total = f.answers.length;
  const pct = Math.round(correct/total*100);
  const byTopic = {};
  TOPICS.forEach(t => byTopic[t.id] = { correct: 0, total: 0 });
  f.answers.forEach(a => {
    byTopic[a.topic].total++;
    if (a.correct) byTopic[a.topic].correct++;
  });
  state.finalResults = { correct, total, pct, byTopic };
  state.screen = 'finalResult';
  render();
}

function renderFinalResult() {
  progLabel().textContent = 'Slutprov klart';
  const r = state.finalResults;
  const godkänt = r.pct >= 60;
  const weakest = [...TOPICS].sort((a, b) => {
    const ra = r.byTopic[a.id], rb = r.byTopic[b.id];
    if (ra.total === 0) return 1;
    if (rb.total === 0) return -1;
    return (ra.correct/ra.total) - (rb.correct/rb.total);
  })[0];
  app().innerHTML = `
    <div class="card fade" style="text-align:center;">
      <h2>${godkänt ? 'Du är på god väg till godkänt!' : 'Bra försök – fortsätt träna.'}</h2>
      <div class="result-big">${r.correct} / ${r.total}</div>
      <div class="result-label">${r.pct} % rätt</div>
      <p style="margin-top:18px;">${godkänt
        ? 'Du klarar de flesta delar. Håll formen uppe genom att träna någon gång till innan provet.'
        : 'Du har flera områden som du fortfarande kan växa i. Fortsätt med träningen – särskilt på det som är svårast just nu.'}</p>
    </div>
    <div class="card">
      <h3>Så gick det per område</h3>
      ${TOPICS.map(t => {
        const br = r.byTopic[t.id];
        const pct = br.total === 0 ? 0 : Math.round(br.correct/br.total*100);
        return `
          <div style="margin:12px 0;">
            <div style="display:flex; justify-content:space-between; align-items:baseline;">
              <strong>${t.name}</strong>
              <span class="muted" style="font-variant-numeric:tabular-nums;">${br.correct}/${br.total}</span>
            </div>
            <div class="bar" style="margin-top:6px; height:4px; background:var(--line); border-radius:2px; overflow:hidden;">
              <span style="display:block; height:100%; width:${pct}%; background:${pct>=60?'var(--good)':'var(--accent)'};"></span>
            </div>
          </div>
        `;
      }).join('')}
      <p style="margin-top:20px;">Näst bästa steg: träna mer på <strong>${weakest.name}</strong>.</p>
      <div class="linkrow">
        <button id="trainWeak">Träna ${weakest.name}</button>
        <button class="ghost" id="toMenu">Till meny</button>
        <button class="ghost" id="retry">Gör om slutprovet</button>
      </div>
    </div>
  `;
  document.getElementById('trainWeak').onclick = () => startPractice(weakest.id);
  document.getElementById('toMenu').onclick = () => { state.screen = 'topicMenu'; render(); };
  document.getElementById('retry').onclick = startFinalTest;
}

        <button class="ghost" id="nextRes">Nästa uppgift</button>
      ` : ''}
    </div>
  `;

  // Autosave
  const ta = document.getElementById('solution');
  const status = document.getElementById('saveStatus');
  let saveTimer;
  ta.addEventListener('input', () => {
    clearTimeout(saveTimer);
    status.textContent = 'Skriver...';
    saveTimer = setTimeout(() => {
      state.resonemangTexts[r.id] = ta.value;
      saveState();
      status.textContent = 'Sparad';
      setTimeout(() => { if (status.textContent === 'Sparad') status.textContent = ''; }, 2000);
    }, 400);
  });

  document.getElementById('clearSol').onclick = () => {
    if (confirm('Rensa din text? Den går inte att få tillbaka.')) {
      ta.value = '';
      state.resonemangTexts[r.id] = '';
      saveState();
      status.textContent = '';
    }
  };

  const showBtn = document.getElementById('showSol');
  if (showBtn) showBtn.onclick = () => {
    state.resonemangShowSolution = true;
    render();
  };
  const hideBtn = document.getElementById('hideSol');
  if (hideBtn) hideBtn.onclick = () => {
    state.resonemangShowSolution = false;
    render();
  };
  document.getElementById('backList').onclick = () => { state.screen = 'resonemangList'; render(); };
  document.getElementById('backMenu').onclick = () => { state.screen = 'topicMenu'; render(); };
  const nextBtn = document.getElementById('nextRes');
  if (nextBtn) nextBtn.onclick = () => {
    state.currentResonemang++;
    state.resonemangShowSolution = false;
    render();
  };
}

// Hjälpfunktion för att säkra textarea-innehåll
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ============================================================
   FRÅGE-UI
============================================================ */
function renderQuestionInput(q) {
  if (q.type === 'mc') {
    return `
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice" data-idx="${i}">${c}</button>
        `).join('')}
      </div>
      <input type="hidden" id="mcPicked" value="-1">
    `;
  } else {
    return `
      <div class="row">
        <input class="answer" id="ansInput" type="text" inputmode="decimal" placeholder="Ditt svar" autocomplete="off" />
      </div>
      <div class="muted" style="margin-top:8px; font-size:13px;">Tips: skriv decimaltal med komma, t.ex. 3,5.</div>
    `;
  }
}

function wireQuestion(q, onAnswered) {
  const submitBtn = document.getElementById('submitBtn');
  let answered = false;

  if (q.type === 'mc') {
    const btns = document.querySelectorAll('.choice');
    let picked = -1;
    btns.forEach(btn => {
      btn.onclick = () => {
        if (answered) return;
        btns.forEach(b => b.style.borderColor = '');
        btn.style.borderColor = 'var(--ink)';
        btn.style.background = 'var(--accent-soft)';
        picked = parseInt(btn.dataset.idx);
        document.getElementById('mcPicked').value = picked;
      };
    });
    submitBtn.onclick = () => {
      if (answered) return;
      if (picked === -1) {
        submitBtn.textContent = 'Välj ett svar först';
        setTimeout(() => { if (!answered) submitBtn.textContent = 'Svara'; }, 1200);
        return;
      }
      answered = true;
      const correct = picked === q.correctIndex;
      btns.forEach((b, i) => {
        b.disabled = true;
        b.style.background = '';
        b.style.borderColor = '';
        if (i === picked && correct) b.classList.add('picked-correct');
        else if (i === picked && !correct) b.classList.add('picked-wrong');
        else if (i === q.correctIndex) b.classList.add('reveal-correct');
      });
      showFeedback(q, correct);
      onAnswered(correct);
    };
  } else {
    const input = document.getElementById('ansInput');
    input.focus();
    input.onkeydown = e => {
      if (e.key === 'Enter' && !answered) submitBtn.click();
    };
    submitBtn.onclick = () => {
      if (answered) return;
      const v = parseAnswer(input.value);
      if (isNaN(v)) {
        submitBtn.textContent = 'Skriv ett svar';
        setTimeout(() => { if (!answered) submitBtn.textContent = 'Svara'; }, 1200);
        return;
      }
      answered = true;
      const tol = q.tolerance || 0.01;
      const correct = Math.abs(v - q.answer) <= tol;
      input.disabled = true;
      if (correct) {
        input.style.borderColor = 'var(--good)';
        input.style.background = 'var(--good-soft)';
      } else {
        input.style.borderColor = 'var(--bad)';
        input.style.background = 'var(--bad-soft)';
      }
      showFeedback(q, correct);
      onAnswered(correct);
    };
  }
}

function showFeedback(q, correct) {
  const fb = document.getElementById('fb');
  const correctText = q.type === 'mc' ? q.choices[q.correctIndex] : fmtNum(q.answer);
  if (correct) {
    fb.innerHTML = `
      <div class="feedback good">
        <span class="tag">Rätt svar</span>
        Bra jobbat. Så här kan man tänka:
        <div class="steps">
          ${q.steps.map(s => `<div>${s}</div>`).join('')}
        </div>
      </div>
    `;
  } else {
    fb.innerHTML = `
      <div class="feedback bad">
        <span class="tag">Inte riktigt</span>
        Rätt svar är <strong>${correctText}</strong>. Så här kan man tänka steg för steg:
        <div class="steps">
          ${q.steps.map(s => `<div>${s}</div>`).join('')}
        </div>
        Ta det lugnt, du får nästa fråga strax och får öva mer.
      </div>
    `;
  }
}

/* ============================================================
   LÄRARLOGGBOK
   Aktiveras via URL (?larare=1) eller tangenter (Shift+L tre gånger)
============================================================ */
function isTeacherMode() {
  const params = new URLSearchParams(window.location.search);
  return params.get('larare') === '1' || localStorage.getItem('np_teacher_mode') === '1';
}

function getCurrentContext() {
  const screen = state.screen;
  if (screen === 'practice' && state.currentTopic) {
    const topic = TOPICS.find(t => t.id === state.currentTopic);
    return `Tränar: ${topic ? topic.name : state.currentTopic}`;
  }
  if (screen === 'resonemang' && state.currentResonemang != null) {
    const r = RESONEMANG[state.currentResonemang];
    return `Resonemangsuppgift: ${r ? r.område : ''}`;
  }
  if (screen === 'diagnosis') return 'Start-kollen';
  if (screen === 'finalTest') return 'Slutprovet';
  if (screen === 'strategier') return 'Strategier';
  if (screen === 'npProv') return 'NP-prov (länkar)';
  if (screen === 'topicMenu') return 'Huvudmeny';
  if (screen === 'start') return 'Startsidan';
  return screen;
}

function renderLogEntries() {
  const entries = document.getElementById('logEntries');
  if (!entries) return;
  if (state.teacherLog.length === 0) {
    entries.innerHTML = '<div style="color:#a39482; font-style:italic; padding:8px 0;">Inga anteckningar än.</div>';
    return;
  }
  entries.innerHTML = [...state.teacherLog].reverse().map(e => `
    <div class="entry">
      <div class="when">${e.when}</div>
      <div class="ctx">${e.context}</div>
      <div>${escapeHtml(e.text)}</div>
    </div>
  `).join('');
}

function saveLogEntry() {
  const input = document.getElementById('logInput');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const when = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  state.teacherLog.push({
    when,
    context: getCurrentContext(),
    text,
  });
  saveState();
  input.value = '';
  renderLogEntries();
}

function exportLog() {
  if (state.teacherLog.length === 0) {
    alert('Inga anteckningar att exportera än.');
    return;
  }
  const text = [
    `LÄRARLOGGBOK – NP-matteverktyget`,
    `Exporterad: ${new Date().toLocaleString('sv-SE')}`,
    `Version: ${VERSION}`,
    `Antal anteckningar: ${state.teacherLog.length}`,
    ``,
    `====================`,
    ``,
    ...state.teacherLog.map(e => `[${e.when}] ${e.context}\n${e.text}\n`),
  ].join('\n');
  // Skapa en nedladdningslänk
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lararlogg-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function initTeacherMode() {
  if (!isTeacherMode()) return;
  // Spara flaggan så den överlever omladdningar
  localStorage.setItem('np_teacher_mode', '1');
  const toggle = document.getElementById('logToggle');
  const log = document.getElementById('teacherLog');
  toggle.style.display = 'block';
  toggle.onclick = () => {
    const visible = log.style.display !== 'none';
    log.style.display = visible ? 'none' : 'block';
    if (!visible) {
      renderLogEntries();
      document.getElementById('logInput').focus();
    }
  };
  document.getElementById('logSave').onclick = saveLogEntry;
  document.getElementById('logExport').onclick = exportLog;
  document.getElementById('logClose').onclick = () => { log.style.display = 'none'; };
  // Ctrl+Enter i textarean sparar direkt
  document.getElementById('logInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      saveLogEntry();
    }
  });
}
